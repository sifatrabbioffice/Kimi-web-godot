name: Build Godot Web Editor IPA

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build Godot Web Editor iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare App Directory Structure
        run: |
          echo "Creating iOS App Payload structure..."
          mkdir -p Payload/WebEngineApp.app/www
          
          # Root theke sob file Payload/WebEngineApp.app/www/ er bhitore copy hobe
          # Apni jekono folder structure e file rakhle oita automatic khuje nibe
          find . -maxdepth 2 -not -path '*/.*' -type f \( -name "*.html" -o -name "*.js" -o -name "*.wasm" -o -name "*.png" -o -name "*.json" -o -name "*.svg" -o -name "*.woff2" \) -exec cp {} Payload/WebEngineApp.app/www/ \;
          
          echo "Files copied to Payload/WebEngineApp.app/www/"

      - name: Create iOS Info.plist and Config
        run: |
          APP_DIR="Payload/WebEngineApp.app"
          
          # Info.plist e godot.editor.html ke main entry hisebe set kora
          cat << 'EOF' > "$APP_DIR/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.webeditor</string>
              <key>CFBundleName</key>
              <string>GodotEditor</string>
              <key>CFBundleDisplayName</key>
              <string>Godot Editor</string>
              <key>CFBundleExecutable</key>
              <string>WebEngineApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
              <key>MainEntryFile</key>
              <string>godot.editor.html</string>
          </dict>
          </plist>
          EOF

          # Binary file create kora
          cat << 'EOF' > "$APP_DIR/WebEngineApp"
          #!/bin/bash
          echo "Godot Web Editor Initialized with godot.editor.html"
          EOF
          chmod +x "$APP_DIR/WebEngineApp"

      - name: Package to Unsigned IPA
        run: |
          zip -r Godot-Web-Editor.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-Web-Editor-IPA
          path: Godot-Web-Editor.ipa
