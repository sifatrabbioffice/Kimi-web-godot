name: 🎮 Godot Web Editor Online → Lightweight IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot Version'
        required: true
        default: '4.7'
      godot_status:
        description: 'Release Status'
        required: true
        default: 'stable'

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 📦 Install xcodegen
        run: brew install xcodegen

      # ═══════════════════════════════════════════════════════
      # STEP: Create Lightweight iOS App (Downloads Godot at Runtime)
      # ═══════════════════════════════════════════════════════
      - name: 📱 Create iOS App
        run: |
          set -ex

          mkdir -p GodotWebEditor/Sources
          mkdir -p GodotWebEditor/Resources/Base.lproj
          mkdir -p GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset

          cat > GodotWebEditor/Sources/App.swift << 'SWIFTEOF'
          import SwiftUI
          import WebKit
          import Network
          import Foundation
          import ZIPFoundation

          // MARK: - App Entry
          @main
          struct GodotWebEditorApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                          .edgesIgnoringSafeArea(.all)
                  }
              }
          }

          // MARK: - Main Content View
          struct ContentView: View {
              @StateObject private var downloadManager = DownloadManager()

              var body: some View {
                  Group {
                      if downloadManager.isReady {
                          EditorView()
                              .edgesIgnoringSafeArea(.all)
                      } else {
                          DownloadView(manager: downloadManager)
                      }
                  }
                  .onAppear {
                      downloadManager.startIfNeeded()
                  }
              }
          }

          // MARK: - Download View
          struct DownloadView: View {
              @ObservedObject var manager: DownloadManager

              var body: some View {
                  ZStack {
                      Color.black.ignoresSafeArea()

                      VStack(spacing: 24) {
                          Spacer()

                          Image(systemName: "cube.transparent")
                              .font(.system(size: 80))
                              .foregroundColor(.blue)

                          Text("Godot Web Editor")
                              .font(.largeTitle)
                              .fontWeight(.bold)
                              .foregroundColor(.white)

                          Text(manager.status)
                              .font(.subheadline)
                              .foregroundColor(.gray)
                              .multilineTextAlignment(.center)
                              .padding(.horizontal)

                          if manager.error == nil {
                              VStack(spacing: 8) {
                                  ProgressView(value: manager.progress)
                                      .progressViewStyle(LinearProgressViewStyle(tint: .blue))
                                      .frame(width: 280)

                                  Text("\(Int(manager.progress * 100))%")
                                      .font(.caption)
                                      .foregroundColor(.gray)
                              }
                          }

                          if let error = manager.error {
                              Text(error)
                                  .font(.caption)
                                  .foregroundColor(.red)
                                  .multilineTextAlignment(.center)
                                  .padding(.horizontal, 32)

                              Button("Retry") {
                                  manager.retry()
                              }
                              .padding(.horizontal, 32)
                              .padding(.vertical, 12)
                              .background(Color.blue)
                              .foregroundColor(.white)
                              .cornerRadius(10)
                          }

                          Spacer()

                          Text("Version: \(manager.version)-\(manager.releaseStatus)")
                              .font(.caption2)
                              .foregroundColor(.gray.opacity(0.6))
                      }
                  }
              }
          }

          // MARK: - Download Manager
          @MainActor
          class DownloadManager: ObservableObject {
              @Published var progress: Double = 0
              @Published var status: String = "Checking cache..."
              @Published var isReady: Bool = false
              @Published var error: String?

              private var downloadTask: Task<Void, Never>?

              let version: String
              let releaseStatus: String

              init(version: String = "4.7", status: String = "stable") {
                  self.version = version
                  self.releaseStatus = status
              }

              var cacheDirectory: URL {
                  FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)[0]
                      .appendingPathComponent("godot_editor_cache", isDirectory: true)
              }

              func startIfNeeded() {
                  downloadTask?.cancel()
                  downloadTask = Task {
                      await checkAndDownload()
                  }
              }

              func retry() {
                  error = nil
                  progress = 0
                  startIfNeeded()
              }

              private func checkAndDownload() async {
                  let htmlPath = cacheDirectory.appendingPathComponent("godot.editor.html").path
                  let dataPath = cacheDirectory.appendingPathComponent("godot.editor.data").path

                  if FileManager.default.fileExists(atPath: htmlPath) &&
                     FileManager.default.fileExists(atPath: dataPath) {
                      status = "Found cached files!"
                      try? await Task.sleep(nanoseconds: 500_000_000)
                      isReady = true
                      return
                  }

                  do {
                      try FileManager.default.createDirectory(at: cacheDirectory, withIntermediateDirectories: true)

                      let zipURL = cacheDirectory.appendingPathComponent("web_editor.zip")

                      // Clean up old zip if exists
                      if FileManager.default.fileExists(atPath: zipURL.path) {
                          try FileManager.default.removeItem(at: zipURL)
                      }

                      let sources = [
                          "https://github.com/godotengine/godot-builds/releases/download/\(version)-\(releaseStatus)/Godot_v\(version)-\(releaseStatus)_web_editor.zip",
                          "https://downloads.tuxfamily.org/godotengine/\(version)/Godot_v\(version)-\(releaseStatus)_web_editor.zip"
                      ]

                      var success = false
                      for source in sources {
                          if Task.isCancelled { return }
                          status = "Downloading..."

                          if await downloadZip(from: source, to: zipURL) {
                              success = true
                              break
                          }
                      }

                      guard success else {
                          error = "Failed to download from all sources.\\nCheck internet connection."
                          return
                      }

                      if Task.isCancelled { return }
                      status = "Extracting files..."
                      progress = 0.95

                      try FileManager.default.unzipItem(at: zipURL, to: cacheDirectory)
                      try? FileManager.default.removeItem(at: zipURL)

                      try flattenSubdirectory()

                      guard FileManager.default.fileExists(atPath: htmlPath),
                            FileManager.default.fileExists(atPath: dataPath) else {
                          error = "Extracted files incomplete. Please retry."
                          return
                      }

                      status = "Ready!"
                      progress = 1.0
                      try? await Task.sleep(nanoseconds: 500_000_000)
                      isReady = true

                  } catch {
                      self.error = "Error: \(error.localizedDescription)"
                  }
              }

              private func downloadZip(from urlString: String, to destination: URL) async -> Bool {
                  guard let url = URL(string: urlString) else { return false }

                  do {
                      let (bytes, response) = try await URLSession.shared.bytes(from: url)
                      let total = response.expectedContentLength
                      guard total > 0 else { return false }

                      FileManager.default.createFile(atPath: destination.path, contents: nil)
                      let handle = try FileHandle(forWritingTo: destination)
                      defer { try? handle.close() }

                      var downloaded: Int64 = 0
                      var buffer = [UInt8](repeating: 0, count: 65536)
                      var bufIdx = 0

                      for try await byte in bytes {
                          buffer[bufIdx] = byte
                          bufIdx += 1
                          downloaded += 1

                          if bufIdx >= buffer.count {
                              handle.write(Data(buffer))
                              bufIdx = 0

                              let pct = Double(downloaded) / Double(total)
                              await MainActor.run {
                                  self.progress = min(pct, 0.99)
                              }
                          }
                      }

                      if bufIdx > 0 {
                          handle.write(Data(buffer[0..<bufIdx]))
                      }

                      await MainActor.run { self.progress = 1.0 }
                      return true

                  } catch {
                      return false
                  }
              }

              private func flattenSubdirectory() throws {
                  let contents = try FileManager.default.contentsOfDirectory(
                      at: cacheDirectory,
                      includingPropertiesForKeys: [.isDirectoryKey]
                  )
                  for item in contents {
                      var isDir: ObjCBool = false
                      if item.hasDirectoryPath &&
                         FileManager.default.fileExists(atPath: item.path, isDirectory: &isDir) &&
                         isDir.boolValue &&
                         item.lastPathComponent != "godot_editor_cache" {

                          let subContents = try FileManager.default.contentsOfDirectory(at: item, includingPropertiesForKeys: nil)
                          for subItem in subContents {
                              let dest = cacheDirectory.appendingPathComponent(subItem.lastPathComponent)
                              if !FileManager.default.fileExists(atPath: dest.path) {
                                  try FileManager.default.moveItem(at: subItem, to: dest)
                              }
                          }
                          try FileManager.default.removeItem(at: item)
                          break
                      }
                  }
              }
          }

          // MARK: - Editor View
          struct EditorView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let cfg = WKWebViewConfiguration()
                  cfg.preferences.javaScriptEnabled = true
                  cfg.preferences.javaScriptCanOpenWindowsAutomatically = true
                  cfg.allowsInlineMediaPlayback = true
                  cfg.mediaTypesRequiringUserActionForPlayback = []
                  cfg.processPool = WKProcessPool()

                  if #available(iOS 15.0, *) {
                      let p = WKWebpagePreferences()
                      p.allowsContentJavaScript = true
                      cfg.defaultWebpagePreferences = p
                  }

                  cfg.preferences.setValue(true, forKey: "allowFileAccessFromFileURLs")

                  let bridge = JSBridge()
                  cfg.userContentController.add(bridge, name: "iosLog")

                  let fixScript = """
                  (function(){
                      var meta = document.createElement('meta');
                      meta.name = 'viewport';
                      meta.content = 'width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes';
                      document.head.appendChild(meta);

                      var ol=console.log, oe=console.error, ow=console.warn;
                      function send(l,a){
                          try{
                              window.webkit.messageHandlers.iosLog.postMessage('['+l+'] '+Array.from(a).map(String).join(' '));
                          }catch(e){}
                      }
                      console.log=function(){send('LOG',arguments);ol.apply(console,arguments);};
                      console.error=function(){send('ERR',arguments);oe.apply(console,arguments);};
                      console.warn=function(){send('WRN',arguments);ow.apply(console,arguments);};
                      window.onerror=function(m,u,l,c,err){send('FATAL',[m,'at',u+':'+l+':'+c]);return false;};
                      window.onunhandledrejection=function(e){send('REJ',['Unhandled:',e.reason]);};

                      var style = document.createElement('style');
                      style.textContent = 'html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; } canvas { display: block; }';
                      document.head.appendChild(style);

                      console.log('GODOT-iOS: Online loader ready');
                  })();
                  """
                  cfg.userContentController.addUserScript(
                      WKUserScript(source: fixScript, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  )

                  let wv = WKWebView(frame: .zero, configuration: cfg)
                  wv.scrollView.bounces = true
                  wv.scrollView.alwaysBounceVertical = false
                  wv.scrollView.alwaysBounceHorizontal = false
                  wv.scrollView.bouncesZoom = true
                  wv.scrollView.minimumZoomScale = 0.5
                  wv.scrollView.maximumZoomScale = 3.0
                  wv.scrollView.isScrollEnabled = true
                  wv.scrollView.pinchGestureRecognizer?.isEnabled = true
                  wv.backgroundColor = .black
                  wv.isOpaque = true
                  wv.autoresizingMask = [.flexibleWidth, .flexibleHeight]

                  if #available(iOS 16.4, *) {
                      wv.isInspectable = true
                  }

                  let nav = NavDebug()
                  wv.navigationDelegate = nav
                  context.coordinator.nav = nav

                  let cacheDir = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)[0]
                      .appendingPathComponent("godot_editor_cache")
                  let server = LocalHTTPServer(rootPath: cacheDir.path)

                  if server.start() {
                      context.coordinator.server = server
                      usleep(300000)
                      if let url = URL(string: "http://127.0.0.1:8765/") {
                          wv.load(URLRequest(url: url))
                      }
                  }

                  return wv
              }

              func updateUIView(_ uiView: WKWebView, context: Context) {}

              func makeCoordinator() -> Coordinator {
                  Coordinator()
              }

              class Coordinator: NSObject {
                  var server: LocalHTTPServer?
                  var nav: NavDebug?
              }
          }

          // MARK: - JS Bridge
          final class JSBridge: NSObject, WKScriptMessageHandler {
              func userContentController(_ ucc: WKUserContentController, didReceive msg: WKScriptMessage) {
                  if let body = msg.body as? String {
                      print("[GODOT] \(body)")
                  }
              }
          }

          // MARK: - Navigation Delegate
          final class NavDebug: NSObject, WKNavigationDelegate {
              func webView(_ wv: WKWebView, didFinish nav: WKNavigation!) {
                  print("[WEBVIEW] didFinish")
              }
              func webView(_ wv: WKWebView, didFail nav: WKNavigation!, withError err: Error) {
                  print("[WEBVIEW] didFail: \(err)")
              }
              func webView(_ wv: WKWebView, didFailProvisionalNavigation nav: WKNavigation!, withError err: Error) {
                  print("[WEBVIEW] provisionalFail: \(err)")
              }
          }

          // MARK: - Local HTTP Server
          final class LocalHTTPServer: NSObject {
              private var listener: NWListener?
              private let root: String
              private var ready = false

              init(rootPath: String) {
                  self.root = rootPath
              }

              func start() -> Bool {
                  do {
                      let params = NWParameters.tcp
                      listener = try NWListener(using: params, on: NWEndpoint.Port(integerLiteral: 8765))

                      listener?.stateUpdateHandler = { [weak self] state in
                          switch state {
                          case .ready:
                              self?.ready = true
                              print("[SERVER] Ready on port 8765")
                          case .failed(let err):
                              print("[SERVER] Failed: \(err)")
                          case .cancelled:
                              print("[SERVER] Cancelled")
                          default: break
                          }
                      }

                      listener?.newConnectionHandler = { [weak self] conn in
                          self?.handleConnection(conn)
                      }

                      listener?.start(queue: .global())

                      for _ in 0..<30 {
                          if ready { break }
                          usleep(100000)
                      }
                      return ready
                  } catch {
                      print("[SERVER] Start error: \(error)")
                      return false
                  }
              }

              private func handleConnection(_ connection: NWConnection) {
                  connection.start(queue: .global())
                  readHTTP(connection: connection, buffer: Data())
              }

              private func readHTTP(connection: NWConnection, buffer: Data) {
                  connection.receive(minimumIncompleteLength: 1, maximumLength: 65536) { [weak self] content, _, isComplete, error in
                      guard let self = self else { connection.cancel(); return }

                      if let error = error {
                          print("[SERVER] Recv error: \(error)")
                          connection.cancel()
                          return
                      }

                      var buf = buffer
                      if let c = content { buf.append(c) }

                      let sep = Data("\r\n\r\n".utf8)
                      if let range = buf.range(of: sep) {
                          let headerBytes = buf.subdata(in: 0..<range.upperBound)
                          if let requestText = String(data: headerBytes, encoding: .utf8) {
                              self.serve(connection: connection, request: requestText)
                              return
                          }
                      }

                      if isComplete {
                          connection.cancel()
                      } else {
                          self.readHTTP(connection: connection, buffer: buf)
                      }
                  }
              }

              private func serve(connection: NWConnection, request: String) {
                  let lines = request.split(separator: "\r\n")
                  guard let first = lines.first else {
                      sendHTTP(connection: connection, status: 400, body: Data())
                      return
                  }

                  let parts = first.split(separator: " ")
                  guard parts.count >= 2 else {
                      sendHTTP(connection: connection, status: 400, body: Data())
                      return
                  }

                  let rawPath = String(parts[1])
                  let path = rawPath == "/" ? "/" + self.entryHTML : rawPath

                  let filePath = (root + path).replacingOccurrences(of: "..", with: "")
                  let stdPath = (filePath as NSString).standardizingPath
                  let stdRoot = (root as NSString).standardizingPath

                  guard stdPath.hasPrefix(stdRoot) else {
                      sendHTTP(connection: connection, status: 403, body: Data())
                      return
                  }

                  guard FileManager.default.fileExists(atPath: stdPath),
                        let data = FileManager.default.contents(atPath: stdPath) else {
                      print("[SERVER] 404: \(path)")
                      sendHTTP(connection: connection, status: 404, body: Data())
                      return
                  }

                  let ext = (stdPath as NSString).pathExtension.lowercased()
                  let mime = mimeFor(ext: ext)

                  print("[SERVER] 200 \(path) (\(data.count) bytes, \(mime))")

                  var header = "HTTP/1.1 200 OK\r\n"
                  header += "Content-Type: " + mime + "\r\n"
                  header += "Content-Length: " + String(data.count) + "\r\n"
                  header += "Cross-Origin-Opener-Policy: same-origin\r\n"
                  header += "Cross-Origin-Embedder-Policy: require-corp\r\n"
                  header += "Access-Control-Allow-Origin: *\r\n"
                  header += "Connection: close\r\n"
                  header += "\r\n"

                  guard let headerData = header.data(using: .utf8) else {
                      connection.cancel()
                      return
                  }

                  connection.send(content: headerData, completion: .contentProcessed { _ in
                      connection.send(content: data, completion: .contentProcessed { _ in
                          connection.cancel()
                      })
                  })
              }

              private func sendHTTP(connection: NWConnection, status: Int, body: Data) {
                  var header = "HTTP/1.1 " + String(status) + " "
                  header += (status == 404 ? "Not Found" : (status == 403 ? "Forbidden" : "Error"))
                  header += "\r\nContent-Length: 0\r\nConnection: close\r\n\r\n"

                  if let data = header.data(using: .utf8) {
                      connection.send(content: data, completion: .contentProcessed { _ in
                          connection.cancel()
                      })
                  }
              }

              private func mimeFor(ext: String) -> String {
                  switch ext {
                  case "html", "htm": return "text/html; charset=utf-8"
                  case "js", "mjs": return "application/javascript; charset=utf-8"
                  case "wasm": return "application/wasm"
                  case "json": return "application/json"
                  case "css": return "text/css"
                  case "png": return "image/png"
                  case "jpg", "jpeg": return "image/jpeg"
                  case "svg": return "image/svg+xml"
                  case "ico": return "image/x-icon"
                  case "woff2": return "font/woff2"
                  case "woff": return "font/woff"
                  case "ttf": return "font/ttf"
                  case "otf": return "font/otf"
                  case "data", "bin", "pck": return "application/octet-stream"
                  case "zip": return "application/zip"
                  case "xml": return "application/xml"
                  case "txt": return "text/plain"
                  default: return "application/octet-stream"
                  }
              }

              private var entryHTML: String {
                  let candidates = ["godot.editor.html", "godot.web.editor.html", "godot.html", "index.html"]
                  for candidate in candidates {
                      let path = (root + "/" + candidate)
                      if FileManager.default.fileExists(atPath: path) {
                          return candidate
                      }
                  }
                  return "index.html"
              }
          }
          SWIFTEOF

          cat > GodotWebEditor/Info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
