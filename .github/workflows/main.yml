          echo '{"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/Contents.json
          echo '{"images":[{"filename":"appicon.png","idiom":"universal","platform":"ios","size":"1024x1024"}],"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json

          python3 << 'PYEOF'
          import struct, zlib
          w, h = 1024, 1024
          raw = bytes([0x47, 0x8C, 0xB0] * (w * h))
          def png_chunk(t, d):
              c = struct.pack(">I", len(d)) + t + d
              return c + struct.pack(">I", zlib.crc32(t + d) & 0xffffffff)
          ihdr = struct.pack(">IIBBBBB", w, h, 8, 2, 0, 0, 0)
          idat = zlib.compress(b''.join([b'\x00' + raw[i*w*3:(i+1)*w*3] for i in range(h)]))
          png = b'\x89PNG\r\n\x1a\n' + png_chunk(b'IHDR', ihdr) + png_chunk(b'IDAT', idat) + png_chunk(b'IEND', b'')
          with open('GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/appicon.png', 'wb') as f:
              f.write(png)
          print("✅ Icon created")
          PYEOF

          cat > GodotWebEditor/project.yml << 'YAMLEOF'
          name: GodotWebEditor
          settings:
            MARKETING_VERSION: "1.0.0"
            CURRENT_PROJECT_VERSION: "1"
            PRODUCT_BUNDLE_IDENTIFIER: com.godot.webeditor.online
            SWIFT_VERSION: "5.9"
            IPHONEOS_DEPLOYMENT_TARGET: "15.0"
            TARGETED_DEVICE_FAMILY: "1,2"
            CODE_SIGN_IDENTITY: ""
            CODE_SIGNING_REQUIRED: NO
            CODE_SIGNING_ALLOWED: NO
            DEVELOPMENT_TEAM: ""
            ENABLE_BITCODE: NO
          packages:
            ZIPFoundation:
              url: https://github.com/weichsel/ZIPFoundation.git
              from: 0.9.19
          targets:
            GodotWebEditor:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: Sources
              resources:
                - path: Resources
              dependencies:
                - package: ZIPFoundation
              info:
                path: Info.plist
          YAMLEOF

          cd GodotWebEditor
          xcodegen generate
          cd ..

      - name: 🔨 Build Unsigned .app
        run: |
          set -ex
          cd GodotWebEditor

          xcodebuild \
            -project GodotWebEditor.xcodeproj \
            -scheme GodotWebEditor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            ENABLE_BITCODE=NO \
            clean build

          cd ..

      - name: 🔍 Verify .app Bundle
        run: |
          set -ex

          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ .app bundle not found!"
            find DerivedData -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"
          echo ""
          echo "📂 .app contents:"
          ls -la "$APP_PATH/"
          echo ""
          echo "📊 Total .app size: $(du -sh "$APP_PATH" | cut -f1)"

      - name: 📦 Package IPA
        run: |
          set -ex

          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/GodotWebEditor.app/_CodeSignature 2>/dev/null || true

          VERSION="${{ github.event.inputs.godot_version || '4.7' }}"
          IPA_NAME="GodotWebEditor_Online_v${VERSION}_unsigned.ipa"

          zip -qr "$IPA_NAME" Payload
          rm -rf Payload

          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"
          echo "✅ Created: $IPA_NAME ($(du -sh "$IPA_NAME" | cut -f1))"

      - name: ⬆️ Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-editor-online-ipa
          path: GodotWebEditor_Online_v*_unsigned.ipa
          retention-days: 30

      - name: ✅ Done
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  🎉 IPA BUILD COMPLETE                               ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  📁 File: ${{ env.IPA_NAME }}                                  ║"
          echo "║  📱 Install: AltStore / Sideloadly / Scarlet         ║"
          echo "║  🌐 Downloads Godot files on first launch            ║"
          echo "║  💾 Caches locally for offline use                   ║"
          echo "╚══════════════════════════════════════════════════════╝"
