name: 🎮 Godot Web Editor Online (Ultra Light)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      editor_url:
        description: 'Godot Web Editor URL'
        required: true
        default: 'https://editor.godotengine.org/'

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 📦 Install xcodegen
        run: brew install xcodegen

      - name: 📱 Create iOS App
        run: |
          set -ex

          mkdir -p GodotWebEditor/Sources
          mkdir -p GodotWebEditor/Resources/Base.lproj
          mkdir -p GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset

          cat > GodotWebEditor/Sources/App.swift << 'SWIFTEOF'
          import SwiftUI
          import WebKit

          // MARK: - App Entry
          @main
          struct GodotWebEditorApp: App {
              var body: some Scene {
                  WindowGroup {
                      GodotEditorView()
                          .edgesIgnoringSafeArea(.all)
                  }
              }
          }

          // MARK: - Main View
          struct GodotEditorView: View {
              @StateObject private var webViewModel = WebViewModel()

              var body: some View {
                  ZStack {
                      WebView(model: webViewModel)
                          .edgesIgnoringSafeArea(.all)

                      if webViewModel.isLoading {
                          LoadingOverlay(progress: webViewModel.loadProgress)
                      }

                      if let error = webViewModel.loadError {
                          ErrorOverlay(error: error) {
                              webViewModel.reload()
                          }
                      }
                  }
              }
          }

          // MARK: - Loading Overlay
          struct LoadingOverlay: View {
              let progress: Double

              var body: some View {
                  ZStack {
                      Color.black.opacity(0.95).ignoresSafeArea()

                      VStack(spacing: 24) {
                          Image(systemName: "cube.transparent")
                              .font(.system(size: 70))
                              .foregroundColor(.blue)
                              .symbolEffect(.pulse)

                          Text("Godot Web Editor")
                              .font(.largeTitle)
                              .fontWeight(.bold)
                              .foregroundColor(.white)

                          Text("Loading from cache or online...")
                              .font(.subheadline)
                              .foregroundColor(.gray)

                          ProgressView(value: progress)
                              .progressViewStyle(LinearProgressViewStyle(tint: .blue))
                              .frame(width: 260)

                          Text("\(Int(progress * 100))%")
                              .font(.caption)
                              .foregroundColor(.gray)

                          Text("Files auto-cache in background:\nHTML • JS • WASM • DATA • PNG")
                              .font(.caption2)
                              .foregroundColor(.gray.opacity(0.7))
                              .multilineTextAlignment(.center)
                      }
                  }
              }
          }

          // MARK: - Error Overlay
          struct ErrorOverlay: View {
              let error: String
              let onRetry: () -> Void

              var body: some View {
                  ZStack {
                      Color.black.opacity(0.95).ignoresSafeArea()

                      VStack(spacing: 20) {
                          Image(systemName: "wifi.exclamationmark")
                              .font(.system(size: 60))
                              .foregroundColor(.orange)

                          Text("Connection Issue")
                              .font(.title2)
                              .fontWeight(.bold)
                              .foregroundColor(.white)

                          Text(error)
                              .font(.subheadline)
                              .foregroundColor(.gray)
                              .multilineTextAlignment(.center)
                              .padding(.horizontal, 32)

                          Text("If you opened before, cached files may still work.\nTry retry or check internet.")
                              .font(.caption)
                              .foregroundColor(.gray.opacity(0.7))
                              .multilineTextAlignment(.center)

                          Button(action: onRetry) {
                              HStack {
                                  Image(systemName: "arrow.clockwise")
                                  Text("Retry")
                              }
                              .padding(.horizontal, 40)
                              .padding(.vertical, 12)
                          }
                          .background(Color.blue)
                          .foregroundColor(.white)
                          .cornerRadius(10)
                      }
                  }
              }
          }

          // MARK: - WebView Model
          @MainActor
          class WebViewModel: ObservableObject {
              @Published var isLoading = true
              @Published var loadProgress: Double = 0
              @Published var loadError: String?

              let editorURL = "${{ github.event.inputs.editor_url || 'https://editor.godotengine.org/' }}"

              func reload() {
                  loadError = nil
                  isLoading = true
                  loadProgress = 0
                  NotificationCenter.default.post(name: .init("reloadWebView"), object: nil)
              }
          }

          // MARK: - WebView
          struct WebView: UIViewRepresentable {
              @ObservedObject var model: WebViewModel

              func makeUIView(context: Context) -> WKWebView {
                  let cfg = WKWebViewConfiguration()

                  // Persistent data store for caching
                  cfg.websiteDataStore = WKWebsiteDataStore.default()

                  cfg.preferences.javaScriptEnabled = true
                  cfg.preferences.javaScriptCanOpenWindowsAutomatically = true
                  cfg.allowsInlineMediaPlayback = true
                  cfg.mediaTypesRequiringUserActionForPlayback = []
                  cfg.processPool = WKProcessPool()

                  if #available(iOS 15.0, *) {
                      let p = WKWebpagePreferences()
                      p.allowsContentJavaScript = true
                      cfg.defaultWebpagePreferences = p
                  }

                  // Inject console bridge + viewport fix
                  let bridge = JSBridge(model: model)
                  cfg.userContentController.add(bridge, name: "iosLog")

                  let fixScript = """
                  (function(){
                      var meta = document.createElement('meta');
                      meta.name = 'viewport';
                      meta.content = 'width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes';
                      document.head.appendChild(meta);

                      var ol=console.log, oe=console.error, ow=console.warn;
                      function send(l,a){
                          try{
                              window.webkit.messageHandlers.iosLog.postMessage('['+l+'] '+Array.from(a).map(String).join(' '));
                          }catch(e){}
                      }
                      console.log=function(){send('LOG',arguments);ol.apply(console,arguments);};
                      console.error=function(){send('ERR',arguments);oe.apply(console,arguments);};
                      console.warn=function(){send('WRN',arguments);ow.apply(console,arguments);};
                      window.onerror=function(m,u,l,c,err){send('FATAL',[m,'at',u+':'+l+':'+c]);return false;};
                      window.onunhandledrejection=function(e){send('REJ',['Unhandled:',e.reason]);};

                      var style = document.createElement('style');
                      style.textContent = 'html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; } canvas { display: block; }';
                      document.head.appendChild(style);

                      console.log('GODOT-iOS: Online editor loaded');
                  })();
                  """
                  cfg.userContentController.addUserScript(
                      WKUserScript(source: fixScript, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  )

                  let wv = WKWebView(frame: .zero, configuration: cfg)

                  wv.scrollView.bounces = true
                  wv.scrollView.alwaysBounceVertical = false
                  wv.scrollView.alwaysBounceHorizontal = false
                  wv.scrollView.bouncesZoom = true
                  wv.scrollView.minimumZoomScale = 0.5
                  wv.scrollView.maximumZoomScale = 3.0
                  wv.scrollView.isScrollEnabled = true
                  wv.scrollView.pinchGestureRecognizer?.isEnabled = true

                  wv.backgroundColor = .black
                  wv.isOpaque = true
                  wv.autoresizingMask = [.flexibleWidth, .flexibleHeight]

                  if #available(iOS 16.4, *) {
                      wv.isInspectable = true
                  }

                  wv.navigationDelegate = context.coordinator
                  wv.uiDelegate = context.coordinator

                  // Observe progress
                  wv.addObserver(context.coordinator, forKeyPath: #keyPath(WKWebView.estimatedProgress), options: .new, context: nil)
                  wv.addObserver(context.coordinator, forKeyPath: #keyPath(WKWebView.isLoading), options: .new, context: nil)

                  // Load the online editor
                  if let url = URL(string: model.editorURL) {
                      var request = URLRequest(url: url)
                      request.cachePolicy = .returnCacheDataElseLoad
                      wv.load(request)
                  }

                  return wv
              }

              func updateUIView(_ uiView: WKWebView, context: Context) {}

              func makeCoordinator() -> Coordinator {
                  Coordinator(model: model)
              }

              class Coordinator: NSObject, WKNavigationDelegate, WKUIDelegate {
                  let model: WebViewModel

                  init(model: WebViewModel) {
                      self.model = model
                      super.init()
                      NotificationCenter.default.addObserver(self, selector: #selector(reload), name: .init("reloadWebView"), object: nil)
                  }

                  @objc func reload() {
                      // Handled by view update
                  }

                  override func observeValue(forKeyPath keyPath: String?, of object: Any?, change: [NSKeyValueChangeKey : Any]?, context: UnsafeMutableRawPointer?) {
                      guard let wv = object as? WKWebView else { return }

                      if keyPath == #keyPath(WKWebView.estimatedProgress) {
                          DispatchQueue.main.async {
                              self.model.loadProgress = wv.estimatedProgress
                          }
                      }
                      if keyPath == #keyPath(WKWebView.isLoading) {
                          DispatchQueue.main.async {
                              self.model.isLoading = wv.isLoading
                          }
                      }
                  }

                  func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) {
                      DispatchQueue.main.async {
                          self.model.isLoading = false
                          self.model.loadError = nil
                      }
                      print("[WEBVIEW] Loaded: \(webView.url?.absoluteString ?? "unknown")")
                  }

                  func webView(_ webView: WKWebView, didFail navigation: WKNavigation!, withError error: Error) {
                      DispatchQueue.main.async {
                          self.model.loadError = error.localizedDescription
                      }
                      print("[WEBVIEW] Fail: \(error)")
                  }

                  func webView(_ webView: WKWebView, didFailProvisionalNavigation navigation: WKNavigation!, withError error: Error) {
                      DispatchQueue.main.async {
                          self.model.loadError = error.localizedDescription
                      }
                      print("[WEBVIEW] Provisional fail: \(error)")
                  }

                  func webView(_ webView: WKWebView, decidePolicyFor navigationResponse: WKNavigationResponse, decisionHandler: @escaping (WKNavigationResponsePolicy) -> Void) {
                      if let resp = navigationResponse.response as? HTTPURLResponse {
                          let contentLength = resp.value(forHTTPHeaderField: "Content-Length")
                          print("[CACHE] \(resp.url?.lastPathComponent ?? "?") | Status: \(resp.statusCode) | Size: \(contentLength ?? "?") bytes")
                      }
                      decisionHandler(.allow)
                  }
              }
          }

          // MARK: - JS Bridge
          final class JSBridge: NSObject, WKScriptMessageHandler {
              weak var model: WebViewModel?

              init(model: WebViewModel) {
                  self.model = model
              }

              func userContentController(_ ucc: WKUserContentController, didReceive msg: WKScriptMessage) {
                  if let body = msg.body as? String {
                      print("[GODOT] \(body)")
                  }
              }
          }
          SWIFTEOF

          cat > GodotWebEditor/Info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleDisplayName</key><string>Godot Editor</string>
              <key>CFBundleExecutable</key><string>GodotWebEditor</string>
              <key>CFBundleIdentifier</key><string>com.godot.webeditor.online</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>GodotWebEditor</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchStoryboardName</key><string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIViewControllerBasedStatusBarAppearance</key><true/>
              <key>UIStatusBarHidden</key><true/>
          </dict>
          </plist>
          PLISTEOF

          cat > GodotWebEditor/Resources/Base.lproj/LaunchScreen.storyboard << 'LAUNCHEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_12" orientation="portrait" appearance="dark"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Godot Web Editor" textAlignment="center" lineBreakMode="middleTruncation" baselineAdjustment="alignBaselines" minimumFontSize="18" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="263.66666666666669" width="393" height="43"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="36"/>
                                          <color key="textColor" red="0.93725490570000003" green="0.93725490570000003" blue="0.95686274770000002" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Online • Auto-Cache • WebGL" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="YES" translatesAutoresizingMaskIntoConstraints="NO" id="MN2-Qa-3nb">
                                          <rect key="frame" x="0.0" y="314.66666666666669" width="393" height="21"/>
                                          <fontDescription key="fontDescription" type="system" pointSize="15"/>
                                          <color key="textColor" red="0.5803921569" green="0.5960784314" blue="0.6392156863" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <color key="backgroundColor" red="0.05098039216" green="0.06666666667" blue="0.09019607843" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="e1q-4Y-1Sd"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" constant="-20" id="Rmq-lb-GrQ"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="top" secondItem="GJd-Yh-RWb" secondAttribute="bottom" constant="8" id="abc-12-xyz"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="def-34-uvw"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          LAUNCHEOF

          echo '{"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/Contents.json
          echo '{"images":[{"filename":"appicon.png","idiom":"universal","platform":"ios","size":"1024x1024"}],"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json

          python3 << 'PYEOF'
          import struct, zlib
          w, h = 1024, 1024
          raw = bytes([0x47, 0x8C, 0xB0] * (w * h))
          def png_chunk(t, d):
              c = struct.pack(">I", len(d)) + t + d
              return c + struct.pack(">I", zlib.crc32(t + d) & 0xffffffff)
          ihdr = struct.pack(">IIBBBBB", w, h, 8, 2, 0, 0, 0)
          idat = zlib.compress(b''.join([b'\x00' + raw[i*w*3:(i+1)*w*3] for i in range(h)]))
          png = b'\x89PNG\r\n\x1a\n' + png_chunk(b'IHDR', ihdr) + png_chunk(b'IDAT', idat) + png_chunk(b'IEND', b'')
          with open('GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/appicon.png', 'wb') as f:
              f.write(png)
          print("✅ Icon created")
          PYEOF

          cat > GodotWebEditor/project.yml << 'YAMLEOF'
          name: GodotWebEditor
          settings:
            MARKETING_VERSION: "1.0.0"
            CURRENT_PROJECT_VERSION: "1"
            PRODUCT_BUNDLE_IDENTIFIER: com.godot.webeditor.online
            SWIFT_VERSION: "5.9"
            IPHONEOS_DEPLOYMENT_TARGET: "15.0"
            TARGETED_DEVICE_FAMILY: "1,2"
            CODE_SIGN_IDENTITY: ""
            CODE_SIGNING_REQUIRED: NO
            CODE_SIGNING_ALLOWED: NO
            DEVELOPMENT_TEAM: ""
            ENABLE_BITCODE: NO
          targets:
            GodotWebEditor:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: Sources
              resources:
                - path: Resources
              info:
                path: Info.plist
          YAMLEOF

          cd GodotWebEditor
          xcodegen generate
          cd ..

      - name: 🔨 Build Unsigned .app
        run: |
          set -ex
          cd GodotWebEditor

          xcodebuild \
            -project GodotWebEditor.xcodeproj \
            -scheme GodotWebEditor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            ENABLE_BITCODE=NO \
            clean build

          cd ..

      - name: 🔍 Verify .app Bundle
        run: |
          set -ex
          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ .app bundle not found!"
            exit 1
          fi
          echo "✅ Found app: $APP_PATH"
          echo "📊 Total .app size: $(du -sh "$APP_PATH" | cut -f1)"

      - name: 📦 Package IPA
        run: |
          set -ex
          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/GodotWebEditor.app/_CodeSignature 2>/dev/null || true
          IPA_NAME="GodotWebEditor_Online_Light_unsigned.ipa"
          zip -qr "$IPA_NAME" Payload
          rm -rf Payload
          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"
          echo "✅ Created: $IPA_NAME ($(du -sh "$IPA_NAME" | cut -f1))"

      - name: ⬆️ Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-editor-online-light
          path: GodotWebEditor_Online_Light_unsigned.ipa
          retention-days: 30

      - name: ✅ Done
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  🎉 ULTRA LIGHT IPA BUILD COMPLETE                   ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  📁 File: ${{ env.IPA_NAME }}                          ║"
          echo "║  📱 Size: ~2-3 MB (no bundled Godot files)           ║"
          echo "║  🌐 Loads: ${{ github.event.inputs.editor_url || 'https://editor.godotengine.org/' }}"
          echo "║  💾 Auto-caches all files in background              ║"
          echo "║  📱 Install: AltStore / Sideloadly / Scarlet         ║"
          echo "╚══════════════════════════════════════════════════════╝"
