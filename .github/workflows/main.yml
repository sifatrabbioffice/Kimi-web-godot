name: 🎮 Godot Web Editor → On-Demand Downloader IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Godot Editor Base URL'
        required: true
        default: 'https://editor.godotengine.org/'

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🛠️ Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 📦 Install xcodegen
        run: brew install xcodegen

      # ---- ডিরেক্টরি তৈরি ----
      - name: 📁 Create Directories
        run: |
          mkdir -p GodotWebEditor/Sources
          mkdir -p GodotWebEditor/Resources/Base.lproj
          mkdir -p GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset

      # ---- App.swift (Part 1) ----
      - name: 📝 Write App.swift (Part 1)
        run: |
          cat > GodotWebEditor/Sources/App.swift << 'SWIFTEOF'
          import SwiftUI
          import WebKit
          import Network
          import Foundation

          // CONFIG
          let BASE_URL = "${{ github.event.inputs.base_url || 'https://editor.godotengine.org/' }}"
          let SERVER_PORT: UInt16 = 8765

          // APP ENTRY
          @main
          struct GodotWebEditorApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                          .edgesIgnoringSafeArea(.all)
                  }
              }
          }

          // CONTENT VIEW
          struct ContentView: View {
              @StateObject private var serverManager = ServerManager()

              var body: some View {
                  Group {
                      if serverManager.isReady {
                          EditorWebView(serverManager: serverManager)
                              .edgesIgnoringSafeArea(.all)
                      } else {
                          ServerSetupView(manager: serverManager)
                      }
                  }
                  .onAppear {
                      serverManager.start()
                  }
              }
          }

          // SERVER SETUP / DOWNLOAD VIEW
          struct ServerSetupView: View {
              @ObservedObject var manager: ServerManager

              var body: some View {
                  ZStack {
                      Color.black.ignoresSafeArea()

                      VStack(spacing: 20) {
                          Spacer()

                          Image(systemName: "cube.transparent")
                              .font(.system(size: 70))
                              .foregroundColor(.blue)

                          Text("Godot Web Editor")
                              .font(.largeTitle)
                              .fontWeight(.bold)
                              .foregroundColor(.white)

                          Text(manager.status)
                              .font(.subheadline)
                              .foregroundColor(.gray)
                              .multilineTextAlignment(.center)
                              .padding(.horizontal)

                          if manager.downloadingFile != nil {
                              VStack(spacing: 8) {
                                  Text(manager.downloadingFile!)
                                      .font(.caption)
                                      .foregroundColor(.blue)
                                      .lineLimit(1)

                                  ProgressView(value: manager.downloadProgress)
                                      .progressViewStyle(LinearProgressViewStyle(tint: .blue))
                                      .frame(width: 280)

                                  Text("\(Int(manager.downloadProgress * 100))%  •  \(manager.cachedCount) files cached")
                                      .font(.caption2)
                                      .foregroundColor(.gray)
                              }
                          } else if manager.cachedCount > 0 {
                              Text("\(manager.cachedCount) files cached")
                                  .font(.caption)
                                  .foregroundColor(.green)
                          }

                          if let error = manager.errorMessage {
                              Text(error)
                                  .font(.caption)
                                  .foregroundColor(.red)
                                  .multilineTextAlignment(.center)
                                  .padding(.horizontal, 32)

                              Button("Retry") {
                                  manager.retry()
                              }
                              .padding(.horizontal, 32)
                              .padding(.vertical, 10)
                              .background(Color.blue)
                              .foregroundColor(.white)
                              .cornerRadius(8)
                          }

                          Spacer()

                          Text("Files download on-demand with original names\nHTML • JS • WASM • DATA • PNG")
                              .font(.caption2)
                              .foregroundColor(.gray.opacity(0.6))
                              .multilineTextAlignment(.center)
                      }
                  }
              }
          }
          SWIFTEOF

      # ---- App.swift (Part 2) ----
      - name: 📝 Write App.swift (Part 2)
        run: |
          cat >> GodotWebEditor/Sources/App.swift << 'SWIFTEOF'

          // SERVER MANAGER
          @MainActor
          class ServerManager: ObservableObject {
              @Published var isReady = false
              @Published var status = "Starting local server..."
              @Published var downloadProgress: Double = 0
              @Published var downloadingFile: String?
              @Published var cachedCount = 0
              @Published var errorMessage: String?

              private var server: LocalHTTPServer?

              var cacheDir: URL {
                  FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)[0]
                      .appendingPathComponent("godot_editor_files", isDirectory: true)
              }

              func start() {
                  do {
                      try FileManager.default.createDirectory(at: cacheDir, withIntermediateDirectories: true)
                      updateCachedCount()

                      let s = LocalHTTPServer(
                          rootPath: cacheDir.path,
                          baseURL: BASE_URL,
                          onDownloadStart: { [weak self] file in
                              DispatchQueue.main.async {
                                  self?.downloadingFile = file
                                  self?.downloadProgress = 0
                              }
                          },
                          onDownloadProgress: { [weak self] progress in
                              DispatchQueue.main.async {
                                  self?.downloadProgress = progress
                              }
                          },
                          onDownloadComplete: { [weak self] in
                              DispatchQueue.main.async {
                                  self?.downloadingFile = nil
                                  self?.updateCachedCount()
                              }
                          },
                          onStatusUpdate: { [weak self] msg in
                              DispatchQueue.main.async {
                                  self?.status = msg
                              }
                          }
                      )

                      if s.start() {
                          self.server = s
                          self.status = "Server ready! Loading editor..."
                          self.isReady = true
                      } else {
                          self.errorMessage = "Failed to start local server"
                      }
                  } catch {
                      self.errorMessage = "Error: \(error.localizedDescription)"
                  }
              }

              func retry() {
                  errorMessage = nil
                  isReady = false
                  start()
              }

              private func updateCachedCount() {
                  if let contents = try? FileManager.default.contentsOfDirectory(atPath: cacheDir.path) {
                      cachedCount = contents.filter { !$0.hasPrefix(".") }.count
                  }
              }
          }

          // EDITOR WEBVIEW
          struct EditorWebView: UIViewRepresentable {
              let serverManager: ServerManager

              func makeUIView(context: Context) -> WKWebView {
                  let cfg = WKWebViewConfiguration()
                  cfg.websiteDataStore = WKWebsiteDataStore.default()
                  cfg.preferences.javaScriptCanOpenWindowsAutomatically = true
                  cfg.allowsInlineMediaPlayback = true
                  cfg.mediaTypesRequiringUserActionForPlayback = []

                  if #available(iOS 15.0, *) {
                      let p = WKWebpagePreferences()
                      p.allowsContentJavaScript = true
                      cfg.defaultWebpagePreferences = p
                  }

                  // Console bridge
                  let bridge = JSBridge()
                  cfg.userContentController.add(bridge, name: "iosLog")

                  let fixScript = """
                  (function(){
                      var meta = document.createElement('meta');
                      meta.name = 'viewport';
                      meta.content = 'width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes';
                      document.head.appendChild(meta);

                      var ol=console.log, oe=console.error, ow=console.warn;
                      function send(l,a){
                          try{
                              window.webkit.messageHandlers.iosLog.postMessage('['+l+'] '+Array.from(a).map(String).join(' '));
                          }catch(e){}
                      }
                      console.log=function(){send('LOG',arguments);ol.apply(console,arguments);};
                      console.error=function(){send('ERR',arguments);oe.apply(console,arguments);};
                      console.warn=function(){send('WRN',arguments);ow.apply(console,arguments);};
                      window.onerror=function(m,u,l,c,err){send('FATAL',[m,'at',u+':'+l+':'+c]);return false;};
                      window.onunhandledrejection=function(e){send('REJ',['Unhandled:',e.reason]);};

                      var style = document.createElement('style');
                      style.textContent = 'html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; } canvas { display: block; }';
                      document.head.appendChild(style);

                      console.log('GODOT-iOS: Local server mode active');
                  })();
                  """
                  cfg.userContentController.addUserScript(
                      WKUserScript(source: fixScript, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  )

                  let wv = WKWebView(frame: .zero, configuration: cfg)
                  wv.scrollView.bounces = true
                  wv.scrollView.alwaysBounceVertical = false
                  wv.scrollView.alwaysBounceHorizontal = false
                  wv.scrollView.bouncesZoom = true
                  wv.scrollView.minimumZoomScale = 0.5
                  wv.scrollView.maximumZoomScale = 3.0
                  wv.scrollView.isScrollEnabled = true
                  wv.scrollView.pinchGestureRecognizer?.isEnabled = true
                  wv.backgroundColor = .black
                  wv.isOpaque = true
                  wv.autoresizingMask = [.flexibleWidth, .flexibleHeight]

                  if #available(iOS 16.4, *) {
                      wv.isInspectable = true
                  }

                  wv.navigationDelegate = context.coordinator

                  // Load from LOCAL server
                  if let url = URL(string: "http://127.0.0.1:\(SERVER_PORT)/") {
                      wv.load(URLRequest(url: url))
                  }

                  return wv
              }

              func updateUIView(_ uiView: WKWebView, context: Context) {}

              func makeCoordinator() -> Coordinator {
                  Coordinator()
              }

              class Coordinator: NSObject, WKNavigationDelegate {
                  func webView(_ webView: WKWebView, didFailProvisionalNavigation navigation: WKNavigation!, withError error: Error) {
                      print("[WEBVIEW] Provisional fail: \(error)")
                  }
                  func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) {
                      print("[WEBVIEW] Loaded: \(webView.url?.absoluteString ?? "?")")
                  }
              }
          }

          // JS BRIDGE
          final class JSBridge: NSObject, WKScriptMessageHandler {
              func userContentController(_ ucc: WKUserContentController, didReceive msg: WKScriptMessage) {
                  if let body = msg.body as? String {
                      print("[GODOT] \(body)")
                  }
              }
          }

          // LOCAL HTTP SERVER (with on-demand download)
          final class LocalHTTPServer: NSObject {
              private var listener: NWListener?
              private let root: String
              private let baseURL: String
              private var ready = false

              private let onDownloadStart: ((String) -> Void)?
              private let onDownloadProgress: ((Double) -> Void)?
              private let onDownloadComplete: (() -> Void)?
              private let onStatusUpdate: ((String) -> Void)?

              private var activeDownloads = Set<String>()
              private let downloadQueue = DispatchQueue(label: "download.queue", qos: .userInitiated)

              init(rootPath: String,
                   baseURL: String,
                   onDownloadStart: ((String) -> Void)? = nil,
                   onDownloadProgress: ((Double) -> Void)? = nil,
                   onDownloadComplete: (() -> Void)? = nil,
                   onStatusUpdate: ((String) -> Void)? = nil) {
                  self.root = rootPath
                  self.baseURL = baseURL.hasSuffix("/") ? baseURL : baseURL + "/"
                  self.onDownloadStart = onDownloadStart
                  self.onDownloadProgress = onDownloadProgress
                  self.onDownloadComplete = onDownloadComplete
                  self.onStatusUpdate = onStatusUpdate
              }

              func start() -> Bool {
                  do {
                      let params = NWParameters.tcp
                      listener = try NWListener(using: params, on: NWEndpoint.Port(integerLiteral: SERVER_PORT))

                      listener?.stateUpdateHandler = { [weak self] state in
                          switch state {
                          case .ready:
                              self?.ready = true
                              print("[SERVER] Ready on port \(SERVER_PORT)")
                          case .failed(let err):
                              print("[SERVER] Failed: \(err)")
                          case .cancelled:
                              print("[SERVER] Cancelled")
                          default: break
                          }
                      }

                      listener?.newConnectionHandler = { [weak self] conn in
                          self?.handleConnection(conn)
                      }

                      listener?.start(queue: .global())

                      for _ in 0..<50 {
                          if ready { break }
                          usleep(100000)
                      }
                      return ready
                  } catch {
                      print("[SERVER] Start error: \(error)")
                      return false
                  }
              }

              // MARK: - Connection Handling
              private func handleConnection(_ connection: NWConnection) {
                  connection.start(queue: .global())
                  readHTTP(connection: connection, buffer: Data())
              }

              private func readHTTP(connection: NWConnection, buffer: Data) {
                  connection.receive(minimumIncompleteLength: 1, maximumLength: 65536) { [weak self] content, _, isComplete, error in
                      guard let self = self else { connection.cancel(); return }

                      if let error = error {
                          connection.cancel()
                          return
                      }

                      var buf = buffer
                      if let c = content { buf.append(c) }

                      let sep = Data("\r\n\r\n".utf8)
                      if let range = buf.range(of: sep) {
                          let headerBytes = buf.subdata(in: 0..<range.upperBound)
                          if let requestText = String(data: headerBytes, encoding: .utf8) {
                              self.handleRequest(connection: connection, request: requestText)
                              return
                          }
                      }

                      if isComplete {
                          connection.cancel()
                      } else {
                          self.readHTTP(connection: connection, buffer: buf)
                      }
                  }
              }

              private func handleRequest(connection: NWConnection, request: String) {
                  let lines = request.split(separator: "\r\n")
                  guard let first = lines.first else {
                      sendHTTP(connection: connection, status: 400, body: Data())
                      return
                  }

                  let parts = first.split(separator: " ")
                  guard parts.count >= 2 else {
                      sendHTTP(connection: connection, status: 400, body: Data())
                      return
                  }

                  let rawPath = String(parts[1])
                  let path = rawPath == "/" ? "/" + self.entryHTML : rawPath
                  let fileName = (path as NSString).lastPathComponent

                  let filePath = (root + path).replacingOccurrences(of: "..", with: "")
                  let stdPath = (filePath as NSString).standardizingPath
                  let stdRoot = (root as NSString).standardizingPath

                  guard stdPath.hasPrefix(stdRoot) else {
                      sendHTTP(connection: connection, status: 403, body: Data())
                      return
                  }

                  // Check if file exists locally
                  if FileManager.default.fileExists(atPath: stdPath),
                     let data = FileManager.default.contents(atPath: stdPath) {
                      print("[SERVER] 200 CACHE \(path) (\(data.count) bytes)")
                      self.serveData(connection: connection, data: data, path: path)
                      return
                  }

                  // Need to download
                  downloadQueue.async { [weak self] in
                      guard let self = self else { return }

                      if self.activeDownloads.contains(fileName) {
                          var attempts = 0
                          while self.activeDownloads.contains(fileName) && attempts < 100 {
                              usleep(100000)
                              attempts += 1
                          }
                          if let data = FileManager.default.contents(atPath: stdPath) {
                              self.serveData(connection: connection, data: data, path: path)
                              return
                          }
                      }

                      self.activeDownloads.insert(fileName)

                      DispatchQueue.main.async {
                          self.onDownloadStart?(fileName)
                          self.onStatusUpdate?("Downloading \(fileName)...")
                      }

                      let remoteURL = self.baseURL + (path.hasPrefix("/") ? String(path.dropFirst()) : path)
                      guard let url = URL(string: remoteURL) else {
                          self.activeDownloads.remove(fileName)
                          self.sendHTTP(connection: connection, status: 404, body: Data())
                          return
                      }

                      let semaphore = DispatchSemaphore(value: 0)
                      var downloadedData: Data?
                      let task = URLSession.shared.dataTask(with: url) { data, response, error in
                          downloadedData = data
                          semaphore.signal()
                      }
                      task.resume()
                      semaphore.wait()

                      self.activeDownloads.remove(fileName)

                      guard let data = downloadedData, !data.isEmpty else {
                          DispatchQueue.main.async {
                              self.onStatusUpdate?("Failed to download \(fileName)")
                          }
                          self.sendHTTP(connection: connection, status: 502, body: Data())
                          return
                      }

                      do {
                          let dir = (stdPath as NSString).deletingLastPathComponent
                          try FileManager.default.createDirectory(atPath: dir, withIntermediateDirectories: true)
                          try data.write(to: URL(fileURLWithPath: stdPath))
                          print("[SERVER] SAVED \(path) (\(data.count) bytes)")
                      } catch {
                          print("[SERVER] Save error: \(error)")
                      }

                      DispatchQueue.main.async {
                          self.onDownloadComplete?()
                          self.onStatusUpdate?("Ready")
                      }

                      self.serveData(connection: connection, data: data, path: path)
                  }
              }

              private func serveData(connection: NWConnection, data: Data, path: String) {
                  let ext = ((path as NSString).pathExtension as String).lowercased()
                  let mime = mimeFor(ext: ext)

                  var header = "HTTP/1.1 200 OK\r\n"
                  header += "Content-Type: " + mime + "\r\n"
                  header += "Content-Length: " + String(data.count) + "\r\n"
                  header += "Cross-Origin-Opener-Policy: same-origin\r\n"
                  header += "Cross-Origin-Embedder-Policy: require-corp\r\n"
                  header += "Access-Control-Allow-Origin: *\r\n"
                  header += "Connection: close\r\n"
                  header += "\r\n"

                  guard let headerData = header.data(using: .utf8) else {
                      connection.cancel()
                      return
                  }

                  connection.send(content: headerData, completion: .contentProcessed { _ in
                      connection.send(content: data, completion: .contentProcessed { _ in
                          connection.cancel()
                      })
                  })
              }

              private func sendHTTP(connection: NWConnection, status: Int, body: Data) {
                  var header = "HTTP/1.1 " + String(status) + " "
                  header += (status == 404 ? "Not Found" : (status == 403 ? "Forbidden" : (status == 502 ? "Bad Gateway" : "Error")))
                  header += "\r\nContent-Length: 0\r\nConnection: close\r\n\r\n"

                  if let data = header.data(using: .utf8) {
                      connection.send(content: data, completion: .contentProcessed { _ in
                          connection.cancel()
                      })
                  }
              }

              private func mimeFor(ext: String) -> String {
                  switch ext {
                  case "html", "htm": return "text/html; charset=utf-8"
                  case "js", "mjs": return "application/javascript; charset=utf-8"
                  case "wasm": return "application/wasm"
                  case "json": return "application/json"
                  case "css": return "text/css"
                  case "png": return "image/png"
                  case "jpg", "jpeg": return "image/jpeg"
                  case "svg": return "image/svg+xml"
                  case "ico": return "image/x-icon"
                  case "woff2": return "font/woff2"
                  case "woff": return "font/woff"
                  case "ttf": return "font/ttf"
                  case "otf": return "font/otf"
                  case "data", "bin", "pck": return "application/octet-stream"
                  case "zip": return "application/zip"
                  case "xml": return "application/xml"
                  case "txt": return "text/plain"
                  default: return "application/octet-stream"
                  }
              }

              private var entryHTML: String {
                  let candidates = ["godot.editor.html", "godot.web.editor.html", "godot.html", "index.html"]
                  for candidate in candidates {
                      let path = root + "/" + candidate
                      if FileManager.default.fileExists(atPath: path) {
                          return candidate
                      }
                  }
                  return "godot.editor.html"
              }
          }
          SWIFTEOF

      # ---- Info.plist ----
      - name: 📝 Create Info.plist
        run: |
          cat > GodotWebEditor/Info.plist << 'PLISTEOF'
