name: 🎮 Build Unsigned Godot Web Editor IPA

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/build-godot-web-editor-ipa.yml'
      - 'godot_editor/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot Version (e.g., 4.6)'
        required: true
        default: '4.6'
      godot_status:
        description: 'Release tag (stable, rc1, beta3, etc.)'
        required: true
        default: 'stable'

env:
  GODOT_VERSION: ${{ github.event.inputs.godot_version || '4.6' }}
  GODOT_STATUS: ${{ github.event.inputs.godot_status || 'stable' }}

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      # ═══════════════════════════════════════════════════════
      # STEP 1: Checkout repo
      # ═══════════════════════════════════════════════════════
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════════
      # STEP 2: Setup Xcode
      # ═══════════════════════════════════════════════════════
      - name: 🔧 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ═══════════════════════════════════════════════════════
      # STEP 3: Install tools
      # ═══════════════════════════════════════════════════════
      - name: 🍺 Install xcodegen
        run: brew install xcodegen

      - name: 🐍 Install Pillow
        run: pip3 install Pillow --break-system-packages || pip3 install Pillow --user || true

      # ═══════════════════════════════════════════════════════
      # STEP 4: Download Godot Web Editor
      # ═══════════════════════════════════════════════════════
      - name: ⬇️ Download Godot Web Editor
        run: |
          set -e
          VERSION="$GODOT_VERSION"
          STATUS="$GODOT_STATUS"

          mkdir -p godot_editor && cd godot_editor
          echo "🔍 Downloading Godot ${VERSION}-${STATUS} Web Editor..."

          # Try multiple sources
          SUCCESS=0

          # Source 1: editor.godotengine.org CDN
          BASE_URL="https://editor.godotengine.org/releases/${VERSION}-${STATUS}"
          echo "Trying CDN: $BASE_URL"

          curl -fsL -o index.html "${BASE_URL}/godot.editor.html" && SUCCESS=1 || true
          if [ $SUCCESS -eq 0 ]; then
            curl -fsL -o index.html "${BASE_URL}/index.html" && SUCCESS=1 || true
          fi

          # Source 2: GitHub releases
          if [ $SUCCESS -eq 0 ]; then
            echo "Trying GitHub releases..."
            GH_ZIP="https://github.com/godotengine/godot-builds/releases/download/${VERSION}-${STATUS}/Godot_v${VERSION}-${STATUS}_web_editor.zip"
            curl -fsL -o web_editor.zip "$GH_ZIP" && {
              unzip -q web_editor.zip
              rm -f web_editor.zip
              for f in *.html; do
                [ -f "$f" ] && mv "$f" index.html && break
              done
              SUCCESS=1
            } || true
          fi

          # Source 3: Tuxfamily mirror
          if [ $SUCCESS -eq 0 ]; then
            echo "Trying Tuxfamily mirror..."
            TUX_URL="https://downloads.tuxfamily.org/godotengine/${VERSION}/Godot_v${VERSION}-${STATUS}_web_editor.zip"
            curl -fsL -o web_editor.zip "$TUX_URL" && {
              unzip -q web_editor.zip
              rm -f web_editor.zip
              for f in *.html; do
                [ -f "$f" ] && mv "$f" index.html && break
              done
              SUCCESS=1
            } || true
          fi

          if [ $SUCCESS -eq 0 ] || [ ! -f index.html ]; then
            echo "❌ Failed to download Godot Web Editor"
            echo "Please manually place files in godot_editor/ folder and re-run"
            exit 1
          fi

          echo "✅ index.html downloaded"

          # Download referenced assets
          echo "📦 Downloading assets..."
          grep -oE '[^"'"'"'\s>]+\.(js|wasm|data|zip|worker\.js|worklet\.js)' index.html 2>/dev/null | sort -u | while read -r file; do
            case "$file" in
              http*|//*) continue ;;
            esac
            if [ ! -f "$file" ]; then
              echo "  ⬇️ $file"
              curl -fsL -o "$file" "${BASE_URL}/${file}" || true
            fi
          done

          # Common fallback files
          for file in godot.editor.js godot.editor.wasm godot.editor.worker.js godot.editor.audio.worklet.js godot.editor.data; do
            if [ ! -f "$file" ]; then
              curl -fsL -o "$file" "${BASE_URL}/${file}" || true
            fi
          done

          echo "📂 Files in godot_editor:"
          ls -lah
          cd ..

      # ═══════════════════════════════════════════════════════
      # STEP 5: Create iOS App Structure
      # ═══════════════════════════════════════════════════════
      - name: 🏗️ Create iOS App
        run: |
          set -e
          mkdir -p GodotWebEditor/Sources
          mkdir -p GodotWebEditor/Resources/godot_editor
          mkdir -p GodotWebEditor/Resources/Base.lproj
          mkdir -p GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset

          # Copy Godot files
          cp -R godot_editor/* GodotWebEditor/Resources/godot_editor/

          # ── SwiftUI App ──
          cat > GodotWebEditor/Sources/GodotWebEditorApp.swift << 'EOF'
          import SwiftUI
          import WebKit

          @main
          struct GodotWebEditorApp: App {
              var body: some Scene {
                  WindowGroup {
                      GodotEditorView()
                          .edgesIgnoringSafeArea(.all)
                  }
              }
          }

          struct GodotEditorView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let config = WKWebViewConfiguration()
                  config.preferences.javaScriptEnabled = true
                  config.defaultWebpagePreferences.allowsContentJavaScript = true

                  let webView = WKWebView(frame: .zero, configuration: config)
                  webView.scrollView.bounces = false
                  webView.backgroundColor = .black
                  webView.isOpaque = true

                  if let url = Bundle.main.url(forResource: "index", withExtension: "html", subdirectory: "godot_editor") {
                      webView.loadFileURL(url, allowingReadAccessTo: url.deletingLastPathComponent())
                  }
                  return webView
              }

              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }
          EOF

          # ── Info.plist (NO shell vars in single-quoted heredoc) ──
          cat > GodotWebEditor/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleDisplayName</key><string>Godot Editor</string>
              <key>CFBundleExecutable</key><string>GodotWebEditor</string>
              <key>CFBundleIdentifier</key><string>com.godot.webeditor.local</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>GodotWebEditor</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchStoryboardName</key><string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIViewControllerBasedStatusBarAppearance</key><true/>
              <key>UIStatusBarHidden</key><true/>
          </dict>
          </plist>
          EOF

          # ── LaunchScreen.storyboard ──
          cat > GodotWebEditor/Resources/Base.lproj/LaunchScreen.storyboard << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_12" orientation="portrait" appearance="dark"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Godot Web Editor" textAlignment="center" lineBreakMode="middleTruncation" baselineAdjustment="alignBaselines" minimumFontSize="18" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="263.66666666666669" width="393" height="43"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="36"/>
                                          <color key="textColor" red="0.93725490570000003" green="0.93725490570000003" blue="0.95686274770000002" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Offline • WKWebView • Metal GPU" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="YES" translatesAutoresizingMaskIntoConstraints="NO" id="MN2-Qa-3nb">
                                          <rect key="frame" x="0.0" y="314.66666666666669" width="393" height="21"/>
                                          <fontDescription key="fontDescription" type="system" pointSize="15"/>
                                          <color key="textColor" red="0.5803921569" green="0.5960784314" blue="0.6392156863" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <color key="backgroundColor" red="0.05098039216" green="0.06666666667" blue="0.09019607843" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="e1q-4Y-1Sd"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" constant="-20" id="Rmq-lb-GrQ"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="top" secondItem="GJd-Yh-RWb" secondAttribute="bottom" constant="8" id="abc-12-xyz"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="def-34-uvw"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          EOF

          # ── Assets ──
          echo '{"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/Contents.json
          echo '{"images":[{"filename":"appicon.png","idiom":"universal","platform":"ios","size":"1024x1024"}],"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json

          # ── App Icon ──
          python3 << 'PYEOF'
          try:
              from PIL import Image
              img = Image.new('RGB', (1024, 1024), color=(0x47, 0x8C, 0xB0))
              img.save('GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/appicon.png')
              print("✅ Icon created with Pillow")
          except Exception as e:
              print(f"Pillow failed: {e}")
              import struct, zlib
              w, h = 1024, 1024
              raw = bytes([0x47, 0x8C, 0xB0] * (w * h))
              def png_chunk(t, d):
                  c = struct.pack(">I", len(d)) + t + d
                  return c + struct.pack(">I", zlib.crc32(t + d) & 0xffffffff)
              ihdr = struct.pack(">IIBBBBB", w, h, 8, 2, 0, 0, 0)
              idat = zlib.compress(b''.join([b'\x00' + raw[i*w*3:(i+1)*w*3] for i in range(h)]))
              png = b'\x89PNG\r\n\x1a\n' + png_chunk(b'IHDR', ihdr) + png_chunk(b'IDAT', idat) + png_chunk(b'IEND', b'')
              with open('GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/appicon.png', 'wb') as f:
                  f.write(png)
              print("✅ Icon created with fallback")
          PYEOF

          # ── xcodegen project.yml ──
          cat > GodotWebEditor/project.yml << 'EOF'
          name: GodotWebEditor
          settings:
            MARKETING_VERSION: "1.0.0"
            CURRENT_PROJECT_VERSION: "1"
            PRODUCT_BUNDLE_IDENTIFIER: com.godot.webeditor.local
            SWIFT_VERSION: "5.9"
            IPHONEOS_DEPLOYMENT_TARGET: "15.0"
            TARGETED_DEVICE_FAMILY: "1,2"
            CODE_SIGN_IDENTITY: ""
            CODE_SIGNING_REQUIRED: NO
            CODE_SIGNING_ALLOWED: NO
            DEVELOPMENT_TEAM: ""
            ENABLE_BITCODE: NO
          targets:
            GodotWebEditor:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: Sources
              resources:
                - path: Resources
              info:
                path: Info.plist
          EOF

          cd GodotWebEditor
          xcodegen generate
          cd ..

      # ═══════════════════════════════════════════════════════
      # STEP 6: Build Unsigned .app
      # ═══════════════════════════════════════════════════════
      - name: 🔨 Build Unsigned .app
        run: |
          set -e
          cd GodotWebEditor

          xcodebuild -project GodotWebEditor.xcodeproj             -scheme GodotWebEditor             -configuration Release             -destination 'generic/platform=iOS'             -derivedDataPath ../DerivedData             CODE_SIGN_IDENTITY=""             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO             DEVELOPMENT_TEAM=""             PROVISIONING_PROFILE_SPECIFIER=""             ONLY_ACTIVE_ARCH=NO             ARCHS="arm64"             ENABLE_BITCODE=NO             clean build

          cd ..

      # ═══════════════════════════════════════════════════════
      # STEP 7: Package as IPA
      # ═══════════════════════════════════════════════════════
      - name: 📦 Package IPA
        run: |
          set -e

          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ .app bundle not found"
            find DerivedData -type d -name "*.app" || true
            exit 1
          fi

          echo "✅ Found: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/GodotWebEditor.app/_CodeSignature 2>/dev/null || true

          IPA_NAME="GodotWebEditor_v${GODOT_VERSION}_unsigned.ipa"
          zip -qr "$IPA_NAME" Payload
          rm -rf Payload

          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV
          echo "✅ Created: $IPA_NAME"
          ls -lh "$IPA_NAME"

      # ═══════════════════════════════════════════════════════
      # STEP 8: Upload Artifact
      # ═══════════════════════════════════════════════════════
      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-editor-ipa
          path: GodotWebEditor_v${{ env.GODOT_VERSION }}_unsigned.ipa
          retention-days: 30

      - name: ✅ Done
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  🎉 UNSIGNED IPA BUILD COMPLETE                      ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  📁 File: ${{ env.IPA_NAME }}                        ║"
          echo "║  📱 Install: AltStore / Sideloadly / Scarlet         ║"
          echo "╚══════════════════════════════════════════════════════╝"
