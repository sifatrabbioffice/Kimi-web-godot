name: 🎮 Build Unsigned Godot Web Editor IPA

on:
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot Version (e.g., 4.6)'
        required: true
        default: '4.6'
      godot_status:
        description: 'Release tag (stable, rc1, beta3, etc.)'
        required: true
        default: 'stable'

jobs:
  build-ipa:
    runs-on: macos-latest
    
    steps:
      # ─────────────────────────────────────────
      # 1. Checkout & Xcode Setup
      # ─────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Xcode (Latest Stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🍺 Install xcodegen
        run: brew install xcodegen

      # ─────────────────────────────────────────
      # 2. Download Godot Web Editor Files
      # ─────────────────────────────────────────
      - name: ⬇️ Download Godot Web Editor (Offline Bundle)
        run: |
          VERSION="${{ github.event.inputs.godot_version }}"
          STATUS="${{ github.event.inputs.godot_status }}"
          
          mkdir -p godot_editor && cd godot_editor
          
          echo "🔍 Trying to download Godot ${VERSION}-${STATUS} Web Editor..."
          
          # Primary CDN URL
          BASE_URL="https://editor.godotengine.org/releases/${VERSION}-${STATUS}"
          
          # Try to download main HTML entry point (common names)
          curl -sL -o index.html "${BASE_URL}/godot.editor.html" || \
          curl -sL -o index.html "${BASE_URL}/index.html" || \
          curl -sL -o index.html "${BASE_URL}/godot.html" || true
          
          if [ ! -s index.html ]; then
            echo "⚠️ Could not find web editor at ${BASE_URL}"
            echo "🔄 Trying GitHub releases fallback..."
            
            # Fallback: GitHub releases (godot-builds repo)
            GH_URL="https://github.com/godotengine/godot-builds/releases/download/${VERSION}-${STATUS}/Godot_v${VERSION}-${STATUS}_web_editor.zip"
            curl -sL -o web_editor.zip "$GH_URL" || true
            
            if [ -s web_editor.zip ]; then
              unzip -q web_editor.zip && rm web_editor.zip
              # Rename any .html to index.html
              for f in *.html; do
                [ -f "$f" ] && mv "$f" index.html && break
              done
            fi
          fi
          
          if [ ! -s index.html ]; then
            echo "❌ ERROR: Could not download Godot Web Editor files."
            echo "💡 Tip: Manually upload web editor files to repo root/godot_editor/ and re-run."
            exit 1
          fi
          
          # Smart parse: extract all .js .wasm .data .zip .worker.js .worklet.js references from HTML
          echo "🧠 Parsing HTML for resource dependencies..."
          grep -oE '[^"'"'"'\s>]+\.(js|wasm|data|zip|worker\.js|worklet\.js)' index.html 2>/dev/null | sort -u | while read -r file; do
            # Skip if already downloaded or is external URL
            case "$file" in
              http*) continue ;;
            esac
            if [ ! -f "$file" ]; then
              echo "  ⬇️ Downloading: $file"
              curl -sL -o "$file" "${BASE_URL}/${file}" || true
            fi
          done
          
          # Also try common known files (in case regex missed any)
          for file in godot.editor.js godot.editor.wasm godot.editor.worker.js godot.editor.audio.worklet.js godot.editor.data godot.editor.zip; do
            if [ ! -f "$file" ]; then
              curl -sL -o "$file" "${BASE_URL}/${file}" || true
            fi
          done
          
          echo "📦 Downloaded files:"
          ls -lah
          cd ..

      # ─────────────────────────────────────────
      # 3. Create iOS Project Structure
      # ─────────────────────────────────────────
      - name: 🏗️ Create iOS Wrapper App
        run: |
          mkdir -p GodotWebEditor/Sources
          mkdir -p GodotWebEditor/Resources/godot_editor
          mkdir -p GodotWebEditor/Resources/Base.lproj
          mkdir -p GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset
          
          # ── Copy Godot files into app bundle ──
          cp -R godot_editor/* GodotWebEditor/Resources/godot_editor/ 2>/dev/null || true
          
          # ── SwiftUI App Entry (@main) ──
          cat > GodotWebEditor/Sources/GodotWebEditorApp.swift << 'SWIFTEOF'
          import SwiftUI
          import WebKit

          @main
          struct GodotWebEditorApp: App {
              var body: some Scene {
                  WindowGroup {
                      GodotEditorView()
                          .edgesIgnoringSafeArea(.all)
                  }
              }
          }

          struct GodotEditorView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let config = WKWebViewConfiguration()
                  
                  // Enable JS & WebGL
                  config.preferences.javaScriptEnabled = true
                  config.defaultWebpagePreferences.allowsContentJavaScript = true
                  
                  // Allow large memory for WebAssembly / Godot
                  if #available(iOS 15.0, *) {
                      let prefs = WKWebpagePreferences()
                      prefs.allowsContentJavaScript = true
                      config.defaultWebpagePreferences = prefs
                  }
                  
                  let webView = WKWebView(frame: .zero, configuration: config)
                  webView.scrollView.bounces = false
                  webView.backgroundColor = UIColor.black
                  webView.isOpaque = true
                  
                  // Load bundled Godot Web Editor (fully offline)
                  if let url = Bundle.main.url(forResource: "index", withExtension: "html", subdirectory: "godot_editor") {
                      let baseURL = url.deletingLastPathComponent()
                      webView.loadFileURL(url, allowingReadAccessTo: baseURL)
                  } else {
                      let html = """
                      <html>
                      <head><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
                      <body style="background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif;
                                   display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
                          <div style="text-align:center;">
                              <h2>⚠️ Godot Editor Files Missing</h2>
                              <p>index.html not found in app bundle.</p>
                          </div>
                      </body>
                      </html>
                      """
                      webView.loadHTMLString(html, baseURL: nil)
                  }
                  
                  return webView
              }
              
              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }
          SWIFTEOF
          
          # ── Info.plist ──
          cat > GodotWebEditor/Info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Godot Editor</string>
              <key>CFBundleExecutable</key>
              <string>GodotWebEditor</string>
              <key>CFBundleIdentifier</key>
              <string>com.godot.webeditor.local</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>GodotWebEditor</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIViewControllerBasedStatusBarAppearance</key>
              <true/>
              <key>UIStatusBarHidden</key>
              <true/>
          </dict>
          </plist>
          PLISTEOF
          
          # ── LaunchScreen.storyboard ──
          cat > GodotWebEditor/Resources/Base.lproj/LaunchScreen.storyboard << 'LAUNCHEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_12" orientation="portrait" appearance="dark"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Godot Web Editor" textAlignment="center" lineBreakMode="middleTruncation" baselineAdjustment="alignBaselines" minimumFontSize="18" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="263.66666666666669" width="393" height="43"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="36"/>
                                          <color key="textColor" red="0.93725490570000003" green="0.93725490570000003" blue="0.95686274770000002" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Offline • WKWebView • Metal GPU" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="YES" translatesAutoresizingMaskIntoConstraints="NO" id="MN2-Qa-3nb">
                                          <rect key="frame" x="0.0" y="314.66666666666669" width="393" height="21"/>
                                          <fontDescription key="fontDescription" type="system" pointSize="15"/>
                                          <color key="textColor" red="0.5803921569" green="0.5960784314" blue="0.6392156863" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <color key="backgroundColor" red="0.05098039216" green="0.06666666667" blue="0.09019607843" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="e1q-4Y-1Sd"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" constant="-20" id="Rmq-lb-GrQ"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="top" secondItem="GJd-Yh-RWb" secondAttribute="bottom" constant="8" id="abc-12-xyz"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="def-34-uvw"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          LAUNCHEOF
          
          # ── Assets.xcassets ──
          cat > GodotWebEditor/Resources/Assets.xcassets/Contents.json << 'JSONEOF'
          {"info":{"author":"xcode","version":1}}
          JSONEOF
          
          cat > GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSONEOF'
          {
            "images" : [
              {
                "filename" : "appicon.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSONEOF
          
          # Create a simple solid-color app icon (1024x1024) using sips/Python
          python3 << 'PYEOF'
          from PIL import Image
          img = Image.new('RGB', (1024, 1024), color=(0x47, 0x8C, 0xB0))
          img.save('GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/appicon.png')
          PYEOF

          # ── xcodegen Project Spec ──
          cat > GodotWebEditor/project.yml << 'YAMLEOF'
          name: GodotWebEditor
          settings:
            MARKETING_VERSION: "1.0.0"
            CURRENT_PROJECT_VERSION: "1"
            PRODUCT_BUNDLE_IDENTIFIER: com.godot.webeditor.local
            SWIFT_VERSION: "5.9"
            IPHONEOS_DEPLOYMENT_TARGET: "15.0"
            TARGETED_DEVICE_FAMILY: "1,2"
            CODE_SIGN_IDENTITY: ""
            CODE_SIGNING_REQUIRED: NO
            CODE_SIGNING_ALLOWED: NO
            DEVELOPMENT_TEAM: ""
            PROVISIONING_PROFILE_SPECIFIER: ""
            ENABLE_BITCODE: NO
            STRIP_INSTALLED_PRODUCT: NO
            SWIFT_OPTIMIZATION_LEVEL: "-O"
          targets:
            GodotWebEditor:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: Sources
              resources:
                - path: Resources
              info:
                path: Info.plist
          YAMLEOF
          
          # Generate Xcode project
          cd GodotWebEditor
          xcodegen generate
          cd ..

      # ─────────────────────────────────────────
      # 4. Build Unsigned IPA
      # ─────────────────────────────────────────
      - name: 🔨 Build Unsigned IPA (arm64)
        run: |
          cd GodotWebEditor
          
          xcodebuild -project GodotWebEditor.xcodeproj \
            -scheme GodotWebEditor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ../DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            ENABLE_BITCODE=NO \
            clean build
          
          cd ..
          
          # Locate .app bundle
          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ ERROR: .app bundle not found in DerivedData"
            find DerivedData -type d -name "*.app" || true
            exit 1
          fi
          
          echo "✅ Found app bundle: $APP_PATH"
          
          # Package as IPA (Payload/GodotWebEditor.app)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Remove any signature artifacts if present (ensure truly unsigned)
          rm -rf Payload/GodotWebEditor.app/_CodeSignature 2>/dev/null || true
          
          # Create IPA
          IPA_NAME="GodotWebEditor_v${{ github.event.inputs.godot_version }}_unsigned.ipa"
          zip -qr "$IPA_NAME" Payload
          rm -rf Payload
          
          echo "📦 Created: $IPA_NAME"
          ls -lh "$IPA_NAME"
          
          # Save filename for upload step
          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV

      # ─────────────────────────────────────────
      # 5. Upload Artifact
      # ─────────────────────────────────────────
      - name: 📤 Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_NAME }}
          path: ${{ env.IPA_NAME }}
          retention-days: 30

      - name: ✅ Summary
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║  🎉 UNSIGNED IPA BUILD COMPLETE                            ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  📁 File: ${{ env.IPA_NAME }}                              ║"
          echo "║  📱 Install via: AltStore / Sideloadly / Scarlet           ║"
          echo "║  ⚠️  This IPA is UNSIGNED — sideloader will re-sign it     ║"
          echo "╚════════════════════════════════════════════════════════════╝"
