name: 🎮 Godot Web Editor → Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot Version'
        required: true
        default: '4.6'
      godot_status:
        description: 'Release Status'
        required: true
        default: 'stable'

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 1️⃣ Checkout Repo
        uses: actions/checkout@v4

      - name: 2️⃣ Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 3️⃣ Install xcodegen
        run: brew install xcodegen

      # ═══════════════════════════════════════════════════════
      # STEP 4: Download Godot Web Editor
      # ═══════════════════════════════════════════════════════
      - name: 4️⃣ Download Godot Web Editor
        run: |
          set -ex
          VERSION="${{ github.event.inputs.godot_version || '4.6' }}"
          STATUS="${{ github.event.inputs.godot_status || 'stable' }}"

          echo "=========================================="
          echo "📥 Downloading Godot ${VERSION}-${STATUS}"
          echo "=========================================="

          mkdir -p godot_editor
          cd godot_editor

          URL1="https://github.com/godotengine/godot-builds/releases/download/${VERSION}-${STATUS}/Godot_v${VERSION}-${STATUS}_web_editor.zip"
          echo "Trying: $URL1"

          if curl -fsL -o web_editor.zip "$URL1"; then
            echo "✅ Downloaded from GitHub releases"
          else
            URL2="https://downloads.tuxfamily.org/godotengine/${VERSION}/Godot_v${VERSION}-${STATUS}_web_editor.zip"
            echo "Trying: $URL2"
            curl -fsL -o web_editor.zip "$URL2" || {
              echo "❌ Failed to download from both sources"
              exit 1
            }
            echo "✅ Downloaded from Tuxfamily"
          fi

          echo "📦 ZIP size: $(ls -lh web_editor.zip | awk '{print $5}')"
          unzip -q web_editor.zip
          rm -f web_editor.zip

          # Flatten subdirectory if present
          SUBDIR=$(find . -maxdepth 1 -type d | grep -v '^\.$' | head -n 1)
          if [ -n "$SUBDIR" ] && [ -d "$SUBDIR" ]; then
            mv "$SUBDIR"/* . 2>/dev/null || true
            rmdir "$SUBDIR" 2>/dev/null || true
          fi

          # Rename main HTML
          for f in godot.editor.html godot.web.editor.html godot.html; do
            if [ -f "$f" ] && [ "$f" != "index.html" ]; then
              mv "$f" index.html
              echo "📝 Renamed $f → index.html"
              break
            fi
          done

          if [ ! -f index.html ]; then
            echo "❌ No index.html found!"
            ls -la
            exit 1
          fi

          echo "✅ Ready. Size: $(du -sh . | cut -f1), Files: $(find . -type f | wc -l)"
          ls -la
          cd ..

      # ═══════════════════════════════════════════════════════
      # STEP 5: Create iOS App with HTTP Server + WKWebView
      # ═══════════════════════════════════════════════════════
      # 
      # WHY HTTP SERVER instead of URL Scheme Handler?
      # - URL Scheme (godot://) does NOT support Web Workers
      # - Godot Web Editor uses Web Workers for multi-threading
      # - HTTP localhost supports Workers, WASM, SharedArrayBuffer
      # - This is the ONLY reliable way to run Godot offline
      #
      - name: 5️⃣ Create iOS App
        run: |
          set -ex

          mkdir -p GodotWebEditor/Sources
          mkdir -p GodotWebEditor/Resources/godot_editor
          mkdir -p GodotWebEditor/Resources/Base.lproj
          mkdir -p GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset

          cp -R godot_editor/* GodotWebEditor/Resources/godot_editor/
          echo "✅ Copied $(find GodotWebEditor/Resources/godot_editor -type f | wc -l) files"

          # ── SwiftUI App with Embedded HTTP Server ──
          cat > GodotWebEditor/Sources/App.swift << 'SWIFTEOF'
          import SwiftUI
          import WebKit
          import Foundation
          import Network

          // ═══════════════════════════════════════════════════════
          // Tiny HTTP Server using Network.framework (iOS 12+)
          // Serves files from app bundle's godot_editor folder
          // ═══════════════════════════════════════════════════════
          class TinyHTTPServer: NSObject {
              private var listener: NWListener?
              private let port: UInt16
              private let basePath: String

              init(port: UInt16, basePath: String) {
                  self.port = port
                  self.basePath = basePath
                  super.init()
              }

              func start() {
                  do {
                      let parameters = NWParameters.tcp
                      listener = try NWListener(using: parameters, on: NWEndpoint.Port(integerLiteral: port))

                      listener?.stateUpdateHandler = { state in
                          switch state {
                          case .ready:
                              print("🌐 HTTP Server ready on port \(self.port)")
                          case .failed(let error):
                              print("❌ HTTP Server failed: \(error)")
                          default:
                              break
                          }
                      }

                      listener?.newConnectionHandler = { [weak self] connection in
                          self?.handleConnection(connection)
                      }

                      listener?.start(queue: .global())
                  } catch {
                      print("❌ Failed to start HTTP server: \(error)")
                  }
              }

              func stop() {
                  listener?.cancel()
              }

              private func handleConnection(_ connection: NWConnection) {
                  connection.start(queue: .global())

                  connection.receive(minimumIncompleteLength: 1, maximumLength: 65536) { [weak self] data, _, isComplete, error in
                      guard let self = self else { return }

                      if let error = error {
                          print("❌ Connection error: \(error)")
                          connection.cancel()
                          return
                      }

                      guard let data = data, let request = String(data: data, encoding: .utf8) else {
                          connection.cancel()
                          return
                      }

                      // Parse request line: GET /path HTTP/1.1
                      let lines = request.split(separator: "\r\n")
                      guard let firstLine = lines.first else {
                          self.sendError(connection, status: 400)
                          return
                      }

                      let parts = firstLine.split(separator: " ")
                      guard parts.count >= 2 else {
                          self.sendError(connection, status: 400)
                          return
                      }

                      let path = String(parts[1])
                      self.serveFile(connection, path: path)
                  }
              }

              private func serveFile(_ connection: NWConnection, path: String) {
                  var filePath = basePath + path
                  if path == "/" || path.isEmpty {
                      filePath = basePath + "/index.html"
                  }

                  // Security: prevent directory traversal
                  let resolvedPath = (filePath as NSString).standardizingPath
                  let resolvedBase = (basePath as NSString).standardizingPath
                  guard resolvedPath.hasPrefix(resolvedBase) else {
                      sendError(connection, status: 403)
                      return
                  }

                  guard FileManager.default.fileExists(atPath: resolvedPath) else {
                      print("❌ HTTP 404: \(path)")
                      sendError(connection, status: 404)
                      return
                  }

                  guard let fileData = FileManager.default.contents(atPath: resolvedPath) else {
                      sendError(connection, status: 500)
                      return
                  }

                  let mimeType = Self.mimeType(for: resolvedPath)
                  let headers = """
                  HTTP/1.1 200 OK\r\n                  Content-Type: \(mimeType)\r\n                  Content-Length: \(fileData.count)\r\n                  Cross-Origin-Opener-Policy: same-origin\r\n                  Cross-Origin-Embedder-Policy: require-corp\r\n                  Access-Control-Allow-Origin: *\r\n                  Connection: close\r\n\r\n
                  """

                  guard let headerData = headers.data(using: .utf8) else {
                      sendError(connection, status: 500)
                      return
                  }

                  print("✅ HTTP 200: \(path) (\(fileData.count) bytes, \(mimeType))")

                  connection.send(content: headerData, completion: .contentProcessed { _ in
                      connection.send(content: fileData, completion: .contentProcessed { _ in
                          connection.cancel()
                      })
                  })
              }

              private func sendError(_ connection: NWConnection, status: Int) {
                  let message = status == 404 ? "Not Found" : (status == 403 ? "Forbidden" : "Internal Server Error")
                  let response = "HTTP/1.1 \(status) \(message)\r\nContent-Length: 0\r\nConnection: close\r\n\r\n"
                  guard let data = response.data(using: .utf8) else {
                      connection.cancel()
                      return
                  }
                  connection.send(content: data, completion: .contentProcessed { _ in
                      connection.cancel()
                  })
              }

              private static func mimeType(for path: String) -> String {
                  let ext = (path as NSString).pathExtension.lowercased()
                  switch ext {
                  case "html", "htm": return "text/html; charset=utf-8"
                  case "js", "mjs": return "application/javascript; charset=utf-8"
                  case "wasm": return "application/wasm"
                  case "json": return "application/json"
                  case "css": return "text/css"
                  case "png": return "image/png"
                  case "jpg", "jpeg": return "image/jpeg"
                  case "svg": return "image/svg+xml"
                  case "ico": return "image/x-icon"
                  case "woff2": return "font/woff2"
                  case "woff": return "font/woff"
                  case "ttf": return "font/ttf"
                  case "otf": return "font/otf"
                  case "data", "bin", "pck": return "application/octet-stream"
                  case "zip": return "application/zip"
                  case "xml": return "application/xml"
                  case "txt": return "text/plain"
                  default: return "application/octet-stream"
                  }
              }
          }

          // ═══════════════════════════════════════════════════════
          // Console Logger
          // ═══════════════════════════════════════════════════════
          class GodotLogger: NSObject, WKScriptMessageHandler {
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if let body = message.body as? String {
                      print("🌐 [Godot] \(body)")
                  }
              }
          }

          @main
          struct GodotWebEditorApp: App {
              var body: some Scene {
                  WindowGroup {
                      GodotEditorView()
                          .edgesIgnoringSafeArea(.all)
                  }
              }
          }

          struct GodotEditorView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let config = WKWebViewConfiguration()
                  config.preferences.javaScriptEnabled = true

                  if #available(iOS 15.0, *) {
                      let prefs = WKWebpagePreferences()
                      prefs.allowsContentJavaScript = true
                      config.defaultWebpagePreferences = prefs
                  }

                  // Console logger
                  let logger = GodotLogger()
                  config.userContentController.add(logger, name: "godotLog")

                  // Inject console capture
                  let consoleScript = """
                  (function() {
                      const origLog = console.log, origErr = console.error, origWarn = console.warn;
                      function send(lvl, args) {
                          try { window.webkit.messageHandlers.godotLog.postMessage(`[${lvl}] ` + args.map(String).join(' ')); } catch(e) {}
                      }
                      console.log = function(...a) { send('LOG', a); origLog.apply(console, a); };
                      console.error = function(...a) { send('ERROR', a); origErr.apply(console, a); };
                      console.warn = function(...a) { send('WARN', a); origWarn.apply(console, a); };
                      window.onerror = function(m,u,l,c,err) { send('FATAL', [`${m} at ${u}:${l}:${c}`]); return false; };
                      window.onunhandledrejection = function(e) { send('REJECT', [`Unhandled: ${e.reason}`]); };
                      console.log("Godot iOS: JS injected OK");
                      console.log("crossOriginIsolated: " + window.crossOriginIsolated);
                      console.log("SharedArrayBuffer: " + (typeof SharedArrayBuffer !== 'undefined' ? 'YES' : 'NO'));
                  })();
                  """
                  config.userContentController.addUserScript(
                      WKUserScript(source: consoleScript, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  )

                  let webView = WKWebView(frame: .zero, configuration: config)
                  webView.scrollView.bounces = false
                  webView.backgroundColor = .black
                  webView.isOpaque = true
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]

                  // Start HTTP server
                  let godotPath = Bundle.main.bundlePath + "/godot_editor"
                  let server = TinyHTTPServer(port: 8080, basePath: godotPath)
                  server.start()

                  // Keep server alive
                  context.coordinator.server = server

                  // Load from localhost
                  if let url = URL(string: "http://127.0.0.1:8080/index.html") {
                      print("🚀 Loading Godot from: \(url)")
                      webView.load(URLRequest(url: url))
                  }

                  return webView
              }

              func updateUIView(_ uiView: WKWebView, context: Context) {}

              func makeCoordinator() -> Coordinator {
                  Coordinator()
              }

              class Coordinator: NSObject {
                  var server: TinyHTTPServer?
              }
          }
          SWIFTEOF

          # ── Info.plist ──
          cat > GodotWebEditor/Info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleDisplayName</key><string>Godot Editor</string>
              <key>CFBundleExecutable</key><string>GodotWebEditor</string>
              <key>CFBundleIdentifier</key><string>com.godot.webeditor.local</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>GodotWebEditor</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchStoryboardName</key><string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIViewControllerBasedStatusBarAppearance</key><true/>
              <key>UIStatusBarHidden</key><true/>
          </dict>
          </plist>
          PLISTEOF

          # ── LaunchScreen.storyboard ──
          cat > GodotWebEditor/Resources/Base.lproj/LaunchScreen.storyboard << 'LAUNCHEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_12" orientation="portrait" appearance="dark"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Godot Web Editor" textAlignment="center" lineBreakMode="middleTruncation" baselineAdjustment="alignBaselines" minimumFontSize="18" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="263.66666666666669" width="393" height="43"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="36"/>
                                          <color key="textColor" red="0.93725490570000003" green="0.93725490570000003" blue="0.95686274770000002" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Offline • Local HTTP Server • Metal GPU" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="YES" translatesAutoresizingMaskIntoConstraints="NO" id="MN2-Qa-3nb">
                                          <rect key="frame" x="0.0" y="314.66666666666669" width="393" height="21"/>
                                          <fontDescription key="fontDescription" type="system" pointSize="15"/>
                                          <color key="textColor" red="0.5803921569" green="0.5960784314" blue="0.6392156863" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <color key="backgroundColor" red="0.05098039216" green="0.06666666667" blue="0.09019607843" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="e1q-4Y-1Sd"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" constant="-20" id="Rmq-lb-GrQ"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="top" secondItem="GJd-Yh-RWb" secondAttribute="bottom" constant="8" id="abc-12-xyz"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="def-34-uvw"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          LAUNCHEOF

          # ── Assets ──
          echo '{"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/Contents.json
          echo '{"images":[{"filename":"appicon.png","idiom":"universal","platform":"ios","size":"1024x1024"}],"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json

          # ── App Icon ──
          python3 << 'PYEOF'
          import struct, zlib
          w, h = 1024, 1024
          raw = bytes([0x47, 0x8C, 0xB0] * (w * h))
          def png_chunk(t, d):
              c = struct.pack(">I", len(d)) + t + d
              return c + struct.pack(">I", zlib.crc32(t + d) & 0xffffffff)
          ihdr = struct.pack(">IIBBBBB", w, h, 8, 2, 0, 0, 0)
          idat = zlib.compress(b''.join([b'\x00' + raw[i*w*3:(i+1)*w*3] for i in range(h)]))
          png = b'\x89PNG\r\n\x1a\n' + png_chunk(b'IHDR', ihdr) + png_chunk(b'IDAT', idat) + png_chunk(b'IEND', b'')
          with open('GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/appicon.png', 'wb') as f:
              f.write(png)
          print("✅ Icon created")
          PYEOF

          # ── xcodegen project ──
          cat > GodotWebEditor/project.yml << 'YAMLEOF'
          name: GodotWebEditor
          settings:
            MARKETING_VERSION: "1.0.0"
            CURRENT_PROJECT_VERSION: "1"
            PRODUCT_BUNDLE_IDENTIFIER: com.godot.webeditor.local
            SWIFT_VERSION: "5.9"
            IPHONEOS_DEPLOYMENT_TARGET: "15.0"
            TARGETED_DEVICE_FAMILY: "1,2"
            CODE_SIGN_IDENTITY: ""
            CODE_SIGNING_REQUIRED: NO
            CODE_SIGNING_ALLOWED: NO
            DEVELOPMENT_TEAM: ""
            ENABLE_BITCODE: NO
          targets:
            GodotWebEditor:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: Sources
              resources:
                - path: Resources
              info:
                path: Info.plist
          YAMLEOF

          cd GodotWebEditor
          xcodegen generate
          cd ..

      # ═══════════════════════════════════════════════════════
      # STEP 6: Build Unsigned .app
      # ═══════════════════════════════════════════════════════
      - name: 6️⃣ Build Unsigned .app
        run: |
          set -ex
          cd GodotWebEditor

          xcodebuild             -project GodotWebEditor.xcodeproj             -scheme GodotWebEditor             -configuration Release             -destination 'generic/platform=iOS'             -derivedDataPath ../DerivedData             CODE_SIGN_IDENTITY=""             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO             DEVELOPMENT_TEAM=""             PROVISIONING_PROFILE_SPECIFIER=""             ONLY_ACTIVE_ARCH=NO             ARCHS="arm64"             VALID_ARCHS="arm64"             ENABLE_BITCODE=NO             clean build

          cd ..

      # ═══════════════════════════════════════════════════════
      # STEP 7: Verify .app Bundle
      # ═══════════════════════════════════════════════════════
      - name: 7️⃣ Verify .app Bundle
        run: |
          set -ex

          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ .app bundle not found!"
            find DerivedData -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"
          echo ""
          echo "📂 .app contents:"
          ls -la "$APP_PATH/"

          if [ ! -d "$APP_PATH/godot_editor" ]; then
            echo "⚠️ godot_editor missing! Copying manually..."
            mkdir -p "$APP_PATH/godot_editor"
            cp -R GodotWebEditor/Resources/godot_editor/* "$APP_PATH/godot_editor/"
          fi

          echo ""
          echo "📂 godot_editor in .app:"
          ls -la "$APP_PATH/godot_editor/"
          echo ""
          echo "📊 godot_editor size: $(du -sh "$APP_PATH/godot_editor" | cut -f1)"
          echo "📊 Total .app size: $(du -sh "$APP_PATH" | cut -f1)"

      # ═══════════════════════════════════════════════════════
      # STEP 8: Package IPA
      # ═══════════════════════════════════════════════════════
      - name: 8️⃣ Package IPA
        run: |
          set -ex

          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/GodotWebEditor.app/_CodeSignature 2>/dev/null || true

          VERSION="${{ github.event.inputs.godot_version || '4.6' }}"
          IPA_NAME="GodotWebEditor_v${VERSION}_unsigned.ipa"

          zip -qr "$IPA_NAME" Payload
          rm -rf Payload

          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"
          echo "✅ Created: $IPA_NAME ($(du -sh "$IPA_NAME" | cut -f1))"

      # ═══════════════════════════════════════════════════════
      # STEP 9: Upload
      # ═══════════════════════════════════════════════════════
      - name: 9️⃣ Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-editor-ipa
          path: GodotWebEditor_v*_unsigned.ipa
          retention-days: 30

      - name: ✅ Done
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  🎉 IPA BUILD COMPLETE                               ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  📁 File: $IPA_NAME                                  ║"
          echo "║  📱 Install: AltStore / Sideloadly / Scarlet         ║"
          echo "║  🔧 Fix: Local HTTP Server (localhost:8080)          ║"
          echo "║  ✅ Supports: Web Workers + WASM + SharedArrayBuffer ║"
          echo "╚══════════════════════════════════════════════════════╝"
        env:
          IPA_NAME: ${{ env.IPA_NAME }}
