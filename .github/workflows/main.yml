name: 🎮 Godot Web Editor → Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      godot_version:
        description: 'Godot Version'
        required: true
        default: '4.3'
      godot_status:
        description: 'Release Status'
        required: true
        default: 'stable'

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: 1Checkout Repo
        uses: actions/checkout@v4

      - name: 2Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 3Install xcodegen
        run: brew install xcodegen

      - name: 4Download Godot Web Editor
        run: |
          set -ex
          VERSION="${{ github.event.inputs.godot_version || '4.3' }}"
          STATUS="${{ github.event.inputs.godot_status || 'stable' }}"

          echo "=========================================="
          echo "📥 Downloading Godot ${VERSION}-${STATUS}"
          echo "=========================================="

          mkdir -p godot_editor
          cd godot_editor

          SOURCES=(
            "https://github.com/godotengine/godot-builds/releases/download/${VERSION}-${STATUS}/Godot_v${VERSION}-${STATUS}_web_editor.zip"
            "https://downloads.tuxfamily.org/godotengine/${VERSION}/Godot_v${VERSION}-${STATUS}_web_editor.zip"
            "https://github.com/godotengine/godot-builds/releases/download/${VERSION}-${STATUS}/web_editor.zip"
          )

          for URL in "${SOURCES[@]}"; do
            echo "Trying: $URL"
            if curl -fsL --max-time 60 -o web_editor.zip "$URL"; then
              echo "✅ Downloaded"
              break
            fi
            echo "❌ Failed"
          done

          if [ ! -f web_editor.zip ] || [ ! -s web_editor.zip ]; then
            echo "❌ All sources failed"
            exit 1
          fi

          echo "📦 ZIP: $(ls -lh web_editor.zip | awk '{print $5}')"
          unzip -q web_editor.zip || { echo "❌ Bad ZIP"; exit 1; }
          rm -f web_editor.zip

          SUBDIR=$(find . -maxdepth 1 -type d | grep -v '^\.$' | head -n 1)
          if [ -n "$SUBDIR" ] && [ -d "$SUBDIR" ]; then
            mv "$SUBDIR"/* . 2>/dev/null || true
            rmdir "$SUBDIR" 2>/dev/null || true
          fi

          for f in godot.editor.html godot.web.editor.html godot.html; do
            if [ -f "$f" ] && [ "$f" != "index.html" ]; then
              mv "$f" index.html
              echo "📝 Renamed $f → index.html"
              break
            fi
          done

          if [ ! -f index.html ]; then
            echo "❌ No index.html! Files:"
            ls -la
            exit 1
          fi

          echo "✅ Ready: $(du -sh . | cut -f1), $(find . -type f | wc -l) files"
          ls -la
          cd ..

      - name: 5Create iOS App
        run: |
          set -ex

          mkdir -p GodotWebEditor/Sources
          mkdir -p GodotWebEditor/Resources/godot_editor
          mkdir -p GodotWebEditor/Resources/Base.lproj
          mkdir -p GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset

          cp -R godot_editor/* GodotWebEditor/Resources/godot_editor/
          echo "✅ Copied $(find GodotWebEditor/Resources/godot_editor -type f | wc -l) files"

          cat > GodotWebEditor/Sources/App.swift << 'SWIFTEOF'
          import SwiftUI
          import WebKit
          import Network
          import Foundation

          final class LocalHTTPServer: NSObject {
              private var listener: NWListener?
              private let root: String
              private var ready = false

              init(rootPath: String) {
                  self.root = rootPath
              }

              func start() -> Bool {
                  do {
                      let params = NWParameters.tcp
                      listener = try NWListener(using: params, on: NWEndpoint.Port(integerLiteral: 8765))

                      listener?.stateUpdateHandler = { [weak self] state in
                          switch state {
                          case .ready:
                              self?.ready = true
                              print("[SERVER] Ready on port 8765")
                          case .failed(let err):
                              print("[SERVER] Failed: \(err)")
                          case .cancelled:
                              print("[SERVER] Cancelled")
                          default: break
                          }
                      }

                      listener?.newConnectionHandler = { [weak self] conn in
                          self?.handleConnection(conn)
                      }

                      listener?.start(queue: .global())

                      for _ in 0..<30 {
                          if ready { break }
                          usleep(100000)
                      }
                      return ready
                  } catch {
                      print("[SERVER] Start error: \(error)")
                      return false
                  }
              }

              private func handleConnection(_ connection: NWConnection) {
                  connection.start(queue: .global())
                  readHTTP(connection: connection, buffer: Data())
              }

              private func readHTTP(connection: NWConnection, buffer: Data) {
                  connection.receive(minimumIncompleteLength: 1, maximumLength: 65536) { [weak self] content, _, isComplete, error in
                      guard let self = self else { connection.cancel(); return }

                      if let error = error {
                          print("[SERVER] Recv error: \(error)")
                          connection.cancel()
                          return
                      }

                      var buf = buffer
                      if let c = content { buf.append(c) }

                      let sep = Data("\r\n\r\n".utf8)
                      if let range = buf.range(of: sep) {
                          let headerBytes = buf.subdata(in: 0..<range.upperBound)
                          let bodyBytes = buf.subdata(in: range.upperBound..<buf.count)

                          if let requestText = String(data: headerBytes, encoding: .utf8) {
                              self.serve(connection: connection, request: requestText, bodyData: bodyBytes)
                              return
                          }
                      }

                      if isComplete {
                          connection.cancel()
                      } else {
                          self.readHTTP(connection: connection, buffer: buf)
                      }
                  }
              }

              private func serve(connection: NWConnection, request: String, bodyData: Data) {
                  let lines = request.split(separator: "\r\n")
                  guard let first = lines.first else {
                      sendHTTP(connection: connection, status: 400, body: Data())
                      return
                  }

                  let parts = first.split(separator: " ")
                  guard parts.count >= 2 else {
                      sendHTTP(connection: connection, status: 400, body: Data())
                      return
                  }

                  let rawPath = String(parts[1])
                  let path = rawPath == "/" ? "/index.html" : rawPath

                  let filePath = (root + path).replacingOccurrences(of: "..", with: "")
                  let stdPath = (filePath as NSString).standardizingPath
                  let stdRoot = (root as NSString).standardizingPath

                  guard stdPath.hasPrefix(stdRoot) else {
                      sendHTTP(connection: connection, status: 403, body: Data())
                      return
                  }

                  guard FileManager.default.fileExists(atPath: stdPath),
                        let data = FileManager.default.contents(atPath: stdPath) else {
                      print("[SERVER] 404: \(path)")
                      sendHTTP(connection: connection, status: 404, body: Data())
                      return
                  }

                  let ext = (stdPath as NSString).pathExtension.lowercased()
                  let mime = mimeFor(ext: ext)

                  print("[SERVER] 200 \(path) (\(data.count) bytes)")

                  var header = "HTTP/1.1 200 OK\r\n"
                  header += "Content-Type: " + mime + "\r\n"
                  header += "Content-Length: " + String(data.count) + "\r\n"
                  header += "Cross-Origin-Opener-Policy: same-origin\r\n"
                  header += "Cross-Origin-Embedder-Policy: require-corp\r\n"
                  header += "Access-Control-Allow-Origin: *\r\n"
                  header += "Connection: close\r\n"
                  header += "\r\n"

                  guard let headerData = header.data(using: .utf8) else {
                      connection.cancel()
                      return
                  }

                  connection.send(content: headerData, completion: .contentProcessed { _ in
                      connection.send(content: data, completion: .contentProcessed { _ in
                          connection.cancel()
                      })
                  })
              }

              private func sendHTTP(connection: NWConnection, status: Int, body: Data) {
                  var header = "HTTP/1.1 " + String(status) + " "
                  header += (status == 404 ? "Not Found" : (status == 403 ? "Forbidden" : "Error"))
                  header += "\r\nContent-Length: 0\r\nConnection: close\r\n\r\n"

                  if let data = header.data(using: .utf8) {
                      connection.send(content: data, completion: .contentProcessed { _ in
                          connection.cancel()
                      })
                  }
              }

              private func mimeFor(ext: String) -> String {
                  switch ext {
                  case "html", "htm": return "text/html; charset=utf-8"
                  case "js", "mjs": return "application/javascript; charset=utf-8"
                  case "wasm": return "application/wasm"
                  case "json": return "application/json"
                  case "css": return "text/css"
                  case "png": return "image/png"
                  case "jpg", "jpeg": return "image/jpeg"
                  case "svg": return "image/svg+xml"
                  case "ico": return "image/x-icon"
                  case "woff2": return "font/woff2"
                  case "woff": return "font/woff"
                  case "ttf": return "font/ttf"
                  case "otf": return "font/otf"
                  case "data", "bin", "pck": return "application/octet-stream"
                  case "zip": return "application/zip"
                  case "xml": return "application/xml"
                  case "txt": return "text/plain"
                  default: return "application/octet-stream"
                  }
              }
          }

          final class JSBridge: NSObject, WKScriptMessageHandler {
              func userContentController(_ ucc: WKUserContentController, didReceive msg: WKScriptMessage) {
                  if let body = msg.body as? String {
                      print("[GODOT] \(body)")
                  }
              }
          }

          final class NavDebug: NSObject, WKNavigationDelegate {
              func webView(_ wv: WKWebView, didFinish nav: WKNavigation!) {
                  print("[WEBVIEW] didFinish")
              }
              func webView(_ wv: WKWebView, didFail nav: WKNavigation!, withError err: Error) {
                  print("[WEBVIEW] didFail: \(err)")
              }
              func webView(_ wv: WKWebView, didFailProvisionalNavigation nav: WKNavigation!, withError err: Error) {
                  print("[WEBVIEW] provisionalFail: \(err)")
              }
          }

          @main
          struct GodotWebEditorApp: App {
              var body: some Scene {
                  WindowGroup {
                      EditorView()
                          .edgesIgnoringSafeArea(.all)
                  }
              }
          }

          struct EditorView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let cfg = WKWebViewConfiguration()

                  // ═══════════════════════════════════════════════════════
                  // CRITICAL: WebGL + Canvas settings for Godot rendering
                  // ═══════════════════════════════════════════════════════
                  cfg.preferences.javaScriptEnabled = true
                  cfg.preferences.javaScriptCanOpenWindowsAutomatically = true
                  cfg.allowsInlineMediaPlayback = true
                  cfg.mediaTypesRequiringUserActionForPlayback = []
                  cfg.processPool = WKProcessPool()

                  if #available(iOS 15.0, *) {
                      let p = WKWebpagePreferences()
                      p.allowsContentJavaScript = true
                      cfg.defaultWebpagePreferences = p
                  }

                  // Allow file access for IndexedDB
                  cfg.preferences.setValue(true, forKey: "allowFileAccessFromFileURLs")

                  // Console bridge
                  let bridge = JSBridge()
                  cfg.userContentController.add(bridge, name: "iosLog")

                  // ═══════════════════════════════════════════════════════
                  // MINIMAL INJECTION: Only viewport + console + canvas fix
                  // NO touch-to-mouse mapping (Godot handles touch natively)
                  // NO aggressive CSS (breaks WebGL rendering)
                  // ═══════════════════════════════════════════════════════
                  let fixScript = """
                  (function(){
                      // 1. Viewport: allow zoom but start at normal scale
                      var meta = document.createElement('meta');
                      meta.name = 'viewport';
                      meta.content = 'width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes';
                      document.head.appendChild(meta);

                      // 2. Console bridge
                      var ol=console.log, oe=console.error, ow=console.warn;
                      function send(l,a){
                          try{
                              window.webkit.messageHandlers.iosLog.postMessage('['+l+'] '+Array.from(a).map(String).join(' '));
                          }catch(e){}
                      }
                      console.log=function(){send('LOG',arguments);ol.apply(console,arguments);};
                      console.error=function(){send('ERR',arguments);oe.apply(console,arguments);};
                      console.warn=function(){send('WRN',arguments);ow.apply(console,arguments);};
                      window.onerror=function(m,u,l,c,err){send('FATAL',[m,'at',u+':'+l+':'+c]);return false;};
                      window.onunhandledrejection=function(e){send('REJ',['Unhandled:',e.reason]);};

                      // 3. Monitor canvas creation and log WebGL status
                      var origGetContext = HTMLCanvasElement.prototype.getContext;
                      HTMLCanvasElement.prototype.getContext = function(type, attrs) {
                          var ctx = origGetContext.call(this, type, attrs);
                          if (type === 'webgl2' || type === 'webgl') {
                              console.log('Canvas WebGL context created:', type);
                          }
                          return ctx;
                      };

                      // 4. Fix: Ensure canvas stays visible when Godot resizes it
                      // Godot sets canvas.style.width/height via JS. We must NOT override.
                      // Only fix: ensure the canvas container has proper size
                      var style = document.createElement('style');
                      style.textContent = `
                          html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
                          #canvas, canvas { display: block; }
                      `;
                      document.head.appendChild(style);

                      console.log('GODOT-iOS: Minimal fix loaded. Godot handles touch natively.');
                      console.log('crossOriginIsolated:', window.crossOriginIsolated);
                  })();
                  """
                  cfg.userContentController.addUserScript(
                      WKUserScript(source: fixScript, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                  )

                  let wv = WKWebView(frame: .zero, configuration: cfg)

                  // Zoom settings
                  wv.scrollView.bounces = true
                  wv.scrollView.alwaysBounceVertical = false
                  wv.scrollView.alwaysBounceHorizontal = false
                  wv.scrollView.bouncesZoom = true
                  wv.scrollView.minimumZoomScale = 0.5
                  wv.scrollView.maximumZoomScale = 3.0
                  wv.scrollView.isScrollEnabled = true
                  wv.scrollView.pinchGestureRecognizer?.isEnabled = true

                  wv.backgroundColor = .black
                  wv.isOpaque = true
                  wv.autoresizingMask = [.flexibleWidth, .flexibleHeight]

                  if #available(iOS 16.4, *) {
                      wv.isInspectable = true
                  }

                  let nav = NavDebug()
                  wv.navigationDelegate = nav
                  context.coordinator.nav = nav

                  // Start HTTP server
                  let godotPath = Bundle.main.bundlePath + "/godot_editor"
                  let server = LocalHTTPServer(rootPath: godotPath)

                  if server.start() {
                      context.coordinator.server = server
                      print("[APP] Server started, loading editor...")
                      usleep(300000)

                      if let url = URL(string: "http://127.0.0.1:8765/index.html") {
                          wv.load(URLRequest(url: url))
                      }
                  } else {
                      print("[APP] Server failed!")
                      wv.loadHTMLString("<html><body style=\"background:#000;color:#f00;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;\"><div style=\"text-align:center\"><h1>Server Error</h1><p>Could not start HTTP server</p></div></body></html>", baseURL: nil)
                  }

                  return wv
              }

              func updateUIView(_ uiView: WKWebView, context: Context) {}

              func makeCoordinator() -> Coordinator {
                  Coordinator()
              }

              class Coordinator: NSObject {
                  var server: LocalHTTPServer?
                  var nav: NavDebug?
              }
          }
          SWIFTEOF

          cat > GodotWebEditor/Info.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleDisplayName</key><string>Godot Editor</string>
              <key>CFBundleExecutable</key><string>GodotWebEditor</string>
              <key>CFBundleIdentifier</key><string>com.godot.webeditor.local</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>GodotWebEditor</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>UILaunchStoryboardName</key><string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIViewControllerBasedStatusBarAppearance</key><true/>
              <key>UIStatusBarHidden</key><true/>
          </dict>
          </plist>
          PLISTEOF

          cat > GodotWebEditor/Resources/Base.lproj/LaunchScreen.storyboard << 'LAUNCHEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_12" orientation="portrait" appearance="dark"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Godot Web Editor" textAlignment="center" lineBreakMode="middleTruncation" baselineAdjustment="alignBaselines" minimumFontSize="18" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="263.66666666666669" width="393" height="43"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="36"/>
                                          <color key="textColor" red="0.93725490570000003" green="0.93725490570000003" blue="0.95686274770000002" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                      <label opaque="NO" clipsSubviews="YES" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="Offline • Native Touch • WebGL • Metal GPU" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="YES" translatesAutoresizingMaskIntoConstraints="NO" id="MN2-Qa-3nb">
                                          <rect key="frame" x="0.0" y="314.66666666666669" width="393" height="21"/>
                                          <fontDescription key="fontDescription" type="system" pointSize="15"/>
                                          <color key="textColor" red="0.5803921569" green="0.5960784314" blue="0.6392156863" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <color key="backgroundColor" red="0.05098039216" green="0.06666666667" blue="0.09019607843" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="e1q-4Y-1Sd"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" constant="-20" id="Rmq-lb-GrQ"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="top" secondItem="GJd-Yh-RWb" secondAttribute="bottom" constant="8" id="abc-12-xyz"/>
                                      <constraint firstItem="MN2-Qa-3nb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="def-34-uvw"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          LAUNCHEOF

          echo '{"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/Contents.json
          echo '{"images":[{"filename":"appicon.png","idiom":"universal","platform":"ios","size":"1024x1024"}],"info":{"author":"xcode","version":1}}' > GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json

          python3 << 'PYEOF'
          import struct, zlib
          w, h = 1024, 1024
          raw = bytes([0x47, 0x8C, 0xB0] * (w * h))
          def png_chunk(t, d):
              c = struct.pack(">I", len(d)) + t + d
              return c + struct.pack(">I", zlib.crc32(t + d) & 0xffffffff)
          ihdr = struct.pack(">IIBBBBB", w, h, 8, 2, 0, 0, 0)
          idat = zlib.compress(b''.join([b'\x00' + raw[i*w*3:(i+1)*w*3] for i in range(h)]))
          png = b'\x89PNG\r\n\x1a\n' + png_chunk(b'IHDR', ihdr) + png_chunk(b'IDAT', idat) + png_chunk(b'IEND', b'')
          with open('GodotWebEditor/Resources/Assets.xcassets/AppIcon.appiconset/appicon.png', 'wb') as f:
              f.write(png)
          print("✅ Icon created")
          PYEOF

          cat > GodotWebEditor/project.yml << 'YAMLEOF'
          name: GodotWebEditor
          settings:
            MARKETING_VERSION: "1.0.0"
            CURRENT_PROJECT_VERSION: "1"
            PRODUCT_BUNDLE_IDENTIFIER: com.godot.webeditor.local
            SWIFT_VERSION: "5.9"
            IPHONEOS_DEPLOYMENT_TARGET: "15.0"
            TARGETED_DEVICE_FAMILY: "1,2"
            CODE_SIGN_IDENTITY: ""
            CODE_SIGNING_REQUIRED: NO
            CODE_SIGNING_ALLOWED: NO
            DEVELOPMENT_TEAM: ""
            ENABLE_BITCODE: NO
          targets:
            GodotWebEditor:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: Sources
              resources:
                - path: Resources
              info:
                path: Info.plist
          YAMLEOF

          cd GodotWebEditor
          xcodegen generate
          cd ..

      - name: 6Build Unsigned .app
        run: |
          set -ex
          cd GodotWebEditor

          xcodebuild             -project GodotWebEditor.xcodeproj             -scheme GodotWebEditor             -configuration Release             -destination 'generic/platform=iOS'             -derivedDataPath ../DerivedData             CODE_SIGN_IDENTITY=""             CODE_SIGNING_REQUIRED=NO             CODE_SIGNING_ALLOWED=NO             DEVELOPMENT_TEAM=""             PROVISIONING_PROFILE_SPECIFIER=""             ONLY_ACTIVE_ARCH=NO             ARCHS="arm64"             VALID_ARCHS="arm64"             ENABLE_BITCODE=NO             clean build

          cd ..

      - name: 7Verify .app Bundle
        run: |
          set -ex

          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "❌ .app bundle not found!"
            find DerivedData -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"
          echo ""
          echo "📂 .app contents:"
          ls -la "$APP_PATH/"

          if [ ! -d "$APP_PATH/godot_editor" ]; then
            echo "⚠️ godot_editor missing! Copying manually..."
            mkdir -p "$APP_PATH/godot_editor"
            cp -R GodotWebEditor/Resources/godot_editor/* "$APP_PATH/godot_editor/"
          fi

          echo ""
          echo "📂 godot_editor in .app:"
          ls -la "$APP_PATH/godot_editor/"
          echo ""
          echo "📊 godot_editor size: $(du -sh "$APP_PATH/godot_editor" | cut -f1)"
          echo "📊 Total .app size: $(du -sh "$APP_PATH" | cut -f1)"

      - name: 8Package IPA
        run: |
          set -ex

          APP_PATH=$(find DerivedData -name "GodotWebEditor.app" -type d | head -n 1)

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          rm -rf Payload/GodotWebEditor.app/_CodeSignature 2>/dev/null || true

          VERSION="${{ github.event.inputs.godot_version || '4.3' }}"
          IPA_NAME="GodotWebEditor_v${VERSION}_unsigned.ipa"

          zip -qr "$IPA_NAME" Payload
          rm -rf Payload

          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"
          echo "✅ Created: $IPA_NAME ($(du -sh "$IPA_NAME" | cut -f1))"

      - name: 9Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-editor-ipa
          path: GodotWebEditor_v*_unsigned.ipa
          retention-days: 30

      - name: ✅ Done
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  🎉 IPA BUILD COMPLETE                               ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  📁 File: $IPA_NAME                                  ║"
          echo "║  📱 Install: AltStore / Sideloadly / Scarlet         ║"
          echo "║  🔧 Fix: Removed broken CSS, let Godot handle touch  ║"
          echo "╚══════════════════════════════════════════════════════╝"
        env:
          IPA_NAME: ${{ env.IPA_NAME }}
