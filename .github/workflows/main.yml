name: Build Godot Web Editor IPA

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build Godot Web Editor iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare App Directory Structure
        run: |
          echo "Creating iOS App Payload structure..."
          mkdir -p Payload/WebEngineApp.app/www
          
          # রুট ফোল্ডারের www ফোল্ডার থেকে ফাইলগুলো কপি করা
          if [ -d "www" ]; then
            cp -r www/* Payload/WebEngineApp.app/www/
            echo "Copied all Godot files successfully."
          else
            echo "Error: 'www' folder not found! Please create a 'www' folder and paste your files inside it."
            exit 1
          fi

      - name: Create iOS Info.plist and Native Binary Stub
        run: |
          APP_DIR="Payload/WebEngineApp.app"
          
          # Info.plist ফাইল তৈরি (যেখানে মূল এন্ট্রি ফাইল হিসেবে godot.editor.html সেট করা হয়েছে)
          cat << 'EOF' > "$APP_DIR/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.webeditor</string>
              <key>CFBundleName</key>
              <string>GodotEditor</string>
              <key>CFBundleDisplayName</key>
              <string>Godot Editor</string>
              <key>CFBundleExecutable</key>
              <string>WebEngineApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
                  <string>webgl2</string>
              </array>
          </dict>
          </plist>
          EOF

          # অ্যাপ রান করার জন্য এক্সিকিউটেবল ফাইল তৈরি
          cat << 'EOF' > "$APP_DIR/WebEngineApp"
          #!/bin/bash
          echo "Godot Web Editor Container Started"
          EOF
          chmod +x "$APP_DIR/WebEngineApp"

      - name: Package to Unsigned IPA
        run: |
          zip -r Godot-Web-Editor.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-Web-Editor-IPA
          path: Godot-Web-Editor.ipa
